<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,maximum-scale=1">
<title>Numby · 乘除篇</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#F8F1F8;--card:#FFFFFF;--card2:#FFF5FB;--card3:#F0E6F6;
  --text:#4A3B5C;--text2:#8B78A0;--text3:#B8A8CA;
  --pink:#F2A0C4;--pink2:#E87BAA;--pinkbg:#FFF0F6;
  --lilac:#C5A8E8;--lilac2:#A07DCC;--lilacbg:#F3EAFF;
  --mint:#8DD8C0;--mint2:#5CB89E;--mintbg:#E8FBF3;
  --sky:#8BBFE8;--sky2:#5A9BD4;--skybg:#E8F4FF;
  --peach:#F2C08A;--peach2:#D9983E;--peachbg:#FFF5E8;
  --coral:#F09E8E;--coral2:#D97560;--coralbg:#FFF0EC;
  --r:14px;--r2:18px;--r3:24px;
  --shadow:0 2px 12px rgba(74,59,92,0.06);
  --font:'Quicksand','Noto Sans SC',sans-serif;
}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:var(--font);color:var(--text);display:flex;justify-content:center}
.app{width:100%;max-width:430px;height:100%;display:flex;flex-direction:column;position:relative;overflow:hidden}
.screen{display:none;flex-direction:column;height:100%;position:absolute;inset:0;z-index:1}
.screen.active{display:flex;animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

.mascot{display:inline-block}.mascot-body{font-size:48px;animation:bobble 2.5s ease-in-out infinite}
@keyframes bobble{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-6px) rotate(2deg)}}
.mascot-sm{font-size:28px}.mascot-sm .mascot-body{animation-duration:2s}

/* HOME */
.home-scroll{flex:1;overflow-y:auto;padding:16px 16px 90px;-webkit-overflow-scrolling:touch}
.home-top{text-align:center;padding:max(3vh,12px) 0 16px}
.home-hi{font-size:14px;color:var(--text2);margin-bottom:4px}
.home-title{font-size:26px;font-weight:700;color:var(--text);margin-bottom:2px}
.home-sub{font-size:12px;color:var(--text3);margin-bottom:14px}
.streak-card{background:var(--card);border-radius:var(--r2);padding:14px 18px;box-shadow:var(--shadow);display:flex;align-items:center;gap:14px;margin-bottom:18px}
.streak-icon{font-size:28px}.streak-info{flex:1}
.streak-title{font-size:13px;font-weight:700;margin-bottom:2px}
.streak-bar{height:6px;background:var(--card3);border-radius:3px;overflow:hidden}
.streak-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--peach),var(--pink));transition:width .6s}
.streak-text{font-size:11px;color:var(--text3);margin-top:3px}
.sec-label{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;padding-left:2px}
.scene-list{display:flex;flex-direction:column;gap:10px}
.sc-card{background:var(--card);border-radius:var(--r2);padding:14px 16px;box-shadow:var(--shadow);display:flex;align-items:center;gap:14px;cursor:pointer;transition:all .2s;border:2px solid transparent}
.sc-card:active{transform:scale(.97)}.sc-card.locked{opacity:.4;pointer-events:none}
.sc-emoji{width:46px;height:46px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.sc-info{flex:1;min-width:0}.sc-name{font-size:14px;font-weight:700;margin-bottom:1px}
.sc-desc{font-size:11px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sc-right{text-align:right;flex-shrink:0}.sc-dots{font-size:12px;letter-spacing:3px;margin-bottom:2px}
.sc-tag{font-size:9px;font-weight:700;padding:2px 8px;border-radius:8px;display:inline-block}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(74,59,92,.45);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
.modal-bg.show{display:flex}
.modal{background:var(--card);border-radius:var(--r3);padding:28px 22px 24px;max-width:360px;width:100%;text-align:center;box-shadow:0 12px 40px rgba(74,59,92,.15);animation:popUp .3s ease}
@keyframes popUp{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
.modal h2{font-size:19px;font-weight:700;margin-bottom:6px}
.modal p{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:14px}
.modal .m-tip{background:var(--card2);border-radius:var(--r);padding:12px;font-size:12px;line-height:1.6;text-align:left;margin-bottom:18px;border-left:3px solid var(--pink)}
.btn-go{width:100%;padding:14px;border:none;border-radius:var(--r);font-size:15px;font-weight:700;font-family:var(--font);color:#fff;cursor:pointer}
.btn-go:active{transform:scale(.97);opacity:.9}

/* GAME */
.game-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 6px;flex-shrink:0}
.btn-back{width:38px;height:38px;border-radius:12px;background:var(--card);border:2px solid var(--card3);font-size:17px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2)}
.g-title{font-size:14px;font-weight:700}.g-pts{font-size:13px;font-weight:700;color:var(--pink2)}
.g-prog{margin:6px 16px 0;height:6px;background:var(--card3);border-radius:3px;overflow:hidden;flex-shrink:0}
.g-prog-bar{height:100%;border-radius:3px;transition:width .5s}
.game-body{flex:1;overflow-y:auto;padding:14px 16px;-webkit-overflow-scrolling:touch}

.speech-row{display:flex;align-items:flex-end;gap:10px;margin-bottom:14px}
.speech-bubble{background:var(--card);border-radius:var(--r2);padding:14px 16px;box-shadow:var(--shadow);flex:1;position:relative}
.speech-bubble::before{content:'';position:absolute;bottom:10px;left:-8px;width:0;height:0;border-top:6px solid transparent;border-bottom:6px solid transparent;border-right:8px solid var(--card)}
.q-num{font-size:10px;color:var(--text3);font-weight:700;letter-spacing:1px;margin-bottom:8px}
.q-scene{margin:6px 0 10px}.q-text{font-size:15px;font-weight:600;line-height:1.6}

/* OPTIONS */
.opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.opt{background:var(--card);border:2.5px solid var(--card3);border-radius:var(--r);padding:15px 8px;font-size:18px;font-weight:700;font-family:var(--font);color:var(--text);cursor:pointer;transition:all .15s}
.opt:active{transform:scale(.95)}
.opt.ok{border-color:var(--mint);background:var(--mintbg);animation:pop .35s}
.opt.no{border-color:var(--coral);background:var(--coralbg);animation:shake .35s}
@keyframes pop{50%{transform:scale(1.05)}}
@keyframes shake{25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

.expl{background:var(--card2);border-radius:var(--r);padding:14px;margin-bottom:10px;display:none;animation:fadeIn .25s;font-size:13px;line-height:1.7}
.expl .e-mascot{display:flex;align-items:flex-start;gap:10px}
.expl .e-icon{font-size:24px;flex-shrink:0;margin-top:2px}.expl .e-body{flex:1}
.expl .e-h{font-weight:700;margin-bottom:3px;font-size:13px}
.expl .e-h.ok{color:var(--mint2)}.expl .e-h.no{color:var(--coral2)}
.expl .e-math{color:var(--lilac2);font-weight:700;margin:4px 0;font-size:14px}

.btn-next{width:100%;padding:14px;border:none;border-radius:var(--r);font-size:14px;font-weight:700;font-family:var(--font);color:#fff;cursor:pointer;display:none;transition:all .15s}
.btn-next:active{transform:scale(.97)}

/* RESULT */
.result{text-align:center;padding:max(4vh,20px) 20px 30px;overflow-y:auto;flex:1}
.r-mascot{margin-bottom:8px}.r-title{font-size:22px;font-weight:700;margin-bottom:4px}
.r-sub{font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.6}
.r-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:24px}
.r-stat{background:var(--card);border-radius:var(--r);padding:14px 6px;box-shadow:var(--shadow)}
.r-stat-v{font-size:22px;font-weight:700}.r-stat-l{font-size:10px;color:var(--text3);margin-top:2px}
.btn-main{width:100%;padding:14px;border:none;border-radius:var(--r);font-size:15px;font-weight:700;font-family:var(--font);color:#fff;cursor:pointer;margin-bottom:8px}
.btn-main:active{transform:scale(.97)}
.btn-alt{width:100%;padding:12px;border:2px solid var(--card3);border-radius:var(--r);background:transparent;font-size:13px;font-weight:600;font-family:var(--font);color:var(--text2);cursor:pointer;margin-bottom:8px}

.toast{position:fixed;top:50px;left:50%;transform:translateX(-50%) scale(.9);padding:6px 18px;border-radius:12px;font-size:12px;font-weight:700;z-index:200;opacity:0;transition:all .3s;pointer-events:none;background:var(--pink);color:#fff}
.toast.show{opacity:1;transform:translateX(-50%) scale(1)}
.float-fb{position:fixed;font-size:28px;pointer-events:none;z-index:200;animation:fu .9s ease forwards}
@keyframes fu{from{opacity:1;transform:translateY(0) scale(1)}to{opacity:0;transform:translateY(-90px) scale(1.4)}}

/* ===== SCENE VISUALS ===== */

/* Groups visual (supermarket) */
.groups-w{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;padding:6px 0}
.group-bag{background:var(--peachbg);border:2px solid var(--peach);border-radius:12px;padding:8px;display:flex;flex-wrap:wrap;gap:3px;justify-content:center;min-width:50px}
.group-item{font-size:16px}

/* Sharing visual */
.share-w{display:flex;flex-direction:column;align-items:center;gap:8px}
.share-pool{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;padding:4px 0;max-width:260px}
.share-pool-item{font-size:18px}
.share-bowls{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.share-bowl{background:var(--lilacbg);border:2px solid var(--lilac);border-radius:12px;padding:6px 10px;font-size:12px;font-weight:700;color:var(--lilac2);text-align:center;min-width:40px}

/* Price visual */
.price-w{text-align:center}
.price-items{display:flex;gap:4px;justify-content:center;flex-wrap:wrap;margin-bottom:8px}
.price-tag{font-size:14px;font-weight:700;color:var(--peach2);background:var(--peachbg);padding:4px 12px;border-radius:10px;display:inline-block}

/* Time units visual */
.time-unit-w{text-align:center}
.time-blocks{display:flex;gap:4px;justify-content:center;flex-wrap:wrap;margin:6px 0}
.time-block{background:var(--skybg);border:2px solid var(--sky);border-radius:8px;padding:4px 8px;font-size:11px;font-weight:700;color:var(--sky2)}

/* Direction / flip visual */
.dir-w{text-align:center}
.dir-line{display:flex;align-items:center;justify-content:center;gap:6px;margin:8px 0;font-size:20px}
.dir-num{font-size:28px;font-weight:700;min-width:40px;text-align:center}
.dir-op{font-size:16px;font-weight:700;color:var(--pink2);background:var(--pinkbg);padding:3px 10px;border-radius:8px}
.dir-arrow{font-size:24px;color:var(--text3)}

/* Recipe visual */
.recipe-w{text-align:center}
.recipe-card-v{background:var(--mintbg);border:2px solid var(--mint);border-radius:12px;padding:10px 14px;display:inline-block;text-align:left;font-size:12px;line-height:1.8;color:var(--text)}
.recipe-card-v b{color:var(--mint2)}
.recipe-arrow{font-size:20px;margin:6px 0;color:var(--text3)}
.recipe-q{font-size:14px;font-weight:700;color:var(--lilac2);background:var(--lilacbg);padding:4px 14px;border-radius:10px;display:inline-block}

/* SHARE CARD */
.share-scroll{flex:1;overflow-y:auto;padding:20px 16px;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column;align-items:center}
.share-card-el{width:100%;max-width:360px;background:var(--card);border-radius:var(--r3);padding:32px 24px 28px;box-shadow:0 8px 40px rgba(74,59,92,.1);text-align:center;position:relative;overflow:hidden}
.share-card-el::before{content:'';position:absolute;top:0;left:0;right:0;height:6px;background:linear-gradient(90deg,var(--peach),var(--pink),var(--lilac),var(--sky),var(--mint),var(--coral))}
.share-logo{font-size:36px;margin-bottom:4px}
.share-title{font-size:20px;font-weight:700;margin-bottom:2px}
.share-date{font-size:11px;color:var(--text3);margin-bottom:18px}
.share-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:16px}
.share-sc{background:var(--card2);border-radius:10px;padding:10px 4px;text-align:center}
.share-sc-emoji{font-size:18px;margin-bottom:2px}
.share-sc-name{font-size:9px;color:var(--text2);font-weight:600;margin-bottom:3px}
.share-sc-stars{font-size:10px;letter-spacing:1px}
.share-big{display:flex;justify-content:center;gap:20px;margin-bottom:16px}
.share-stat{text-align:center}.share-stat-v{font-size:28px;font-weight:700}.share-stat-l{font-size:10px;color:var(--text3)}
.share-msg{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:4px}
.share-brand{font-size:10px;color:var(--text3);margin-top:12px}
.share-hint{font-size:12px;color:var(--text3);margin-top:16px;padding:10px;background:var(--card2);border-radius:10px;line-height:1.5}
.share-btns{margin-top:14px;display:flex;flex-direction:column;gap:8px;width:100%;max-width:360px}
</style>
</head>
<body>
<div class="app">

<div class="screen active" id="scrHome">
  <div class="home-scroll">
    <div class="home-top">
      <div class="mascot"><span class="mascot-body">☁️</span></div>
      <div class="home-hi">hi~ 乘除法篇开始啦</div>
      <div class="home-title">Numby · 乘除篇</div>
      <div class="home-sub">理解乘除法的真正含义 ✨</div>
    </div>
    <div class="streak-card" id="streakCard">
      <div class="streak-icon">🌿</div>
      <div class="streak-info">
        <div class="streak-title">成长进度</div>
        <div class="streak-bar"><div class="streak-fill" id="xpBar"></div></div>
        <div class="streak-text" id="xpText">继续加油～</div>
      </div>
    </div>
    <div class="sec-label">选择场景</div>
    <div class="scene-list" id="scList"></div>
  </div>
</div>

<div class="screen" id="scrGame">
  <div class="game-head">
    <button class="btn-back" onclick="goHome()">←</button>
    <span class="g-title" id="gTitle"></span>
    <span class="g-pts" id="gPts">✿ 0</span>
  </div>
  <div class="g-prog"><div class="g-prog-bar" id="gProg"></div></div>
  <div class="game-body">
    <div class="speech-row">
      <div class="mascot mascot-sm"><span class="mascot-body">☁️</span></div>
      <div class="speech-bubble">
        <div class="q-num" id="qNum"></div>
        <div class="q-scene" id="qScene"></div>
        <div class="q-text" id="qText"></div>
      </div>
    </div>
    <div class="opts" id="opts"></div>
    <div class="expl" id="expl"></div>
    <button class="btn-next" id="btnNext" onclick="nextQ()">下一题 ♪</button>
  </div>
</div>

<div class="screen" id="scrResult"><div class="result" id="resBody"></div></div>
<div class="screen" id="scrShare"><div class="share-scroll" id="shareBody"></div></div>

</div>
<div class="modal-bg" id="modalBg"><div class="modal" id="modal"></div></div>
<div class="toast" id="toast"></div>

<script>
const TOTAL=5;
let S={sc:0,qi:0,pts:0,combo:0,mcombo:0,cor:0,qs:[],done:false,prog:lp()};
function lp(){try{if(typeof localStorage!=='undefined'){const d=localStorage.getItem('nb_md');if(d)return JSON.parse(d)}}catch(e){}return{stars:{},unlocked:[0,1],totalCorrect:0,totalPlayed:0}}
function sp(){try{if(typeof localStorage!=='undefined')localStorage.setItem('nb_md',JSON.stringify(S.prog))}catch(e){}}
function R(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function Rf(a){return a[R(0,a.length-1)]}
function sh(a){for(let i=a.length-1;i>0;i--){const j=R(0,i);[a[i],a[j]]=[a[j],a[i]]}return a}
function mo(ans,gw){const s=new Set([String(ans)]);let t=0;while(s.size<4&&t<60){const v=String(gw());if(v!==String(ans))s.add(v);t++}while(s.size<4){const n=Number(String(ans).replace(/[^-\d.]/g,''));const u=String(ans).replace(/[-\d.]/g,'');s.add(String(n+s.size)+u)}return sh([...s])}

const cheers=['做得好！','厉害～','没问题的！','就是这样！','完全正确！'];
const encourages=['没关系，看看为什么～','差一点点！我们来想想～','不要急，慢慢来～','这题有点难，一起看看～','下次一定可以！'];

/* ===== SCENE DEFINITIONS ===== */
const SC=[
{id:0,name:'超市打包',desc:'乘法 = 几组 × 每组几个',emoji:'🛍️',
 bg:'var(--peachbg)',accent:'var(--peach2)',barC:'var(--peach)',
 tut:{t:'超市打包',d:'乘法其实很简单：就是"几组，每组几个，一共多少个"。3袋苹果，每袋4个，就是 3 × 4 = 12。乘法就是把加法变快了！',
 tip:'乘法 = 重复的加法\n3 × 4 就是 4 + 4 + 4\n几组 × 每组几个 = 总数'},gen:genPack},
{id:1,name:'平分零食',desc:'除法 = 平均分给每个人',emoji:'🍬',
 bg:'var(--lilacbg)',accent:'var(--lilac2)',barC:'var(--lilac)',
 tut:{t:'平分零食',d:'除法就是"平均分"。12颗糖分给3个人，每人几颗？一颗一颗分，分到每人4颗，所以 12 ÷ 3 = 4。',
 tip:'除法 = 平均分配\n总数 ÷ 人数 = 每人多少\n除法是乘法的反操作'},gen:genShare},
{id:2,name:'价格计算',desc:'单价 × 数量 = 总价',emoji:'💳',
 bg:'var(--mintbg)',accent:'var(--mint2)',barC:'var(--mint)',
 tut:{t:'价格计算',d:'买3杯15元的奶茶，总价 = 15 × 3 = 45元。反过来，花了45元买了3杯，每杯 = 45 ÷ 3 = 15元。乘和除是同一件事的两个方向！',
 tip:'单价 × 数量 = 总价（乘法）\n总价 ÷ 数量 = 单价（除法）\n它们互为反操作'},gen:genPrice},
{id:3,name:'时间换算',desc:'小时、分钟之间的转换',emoji:'⏱️',
 bg:'var(--skybg)',accent:'var(--sky2)',barC:'var(--sky)',
 tut:{t:'时间换算',d:'1小时 = 60分钟，所以3小时 = 3 × 60 = 180分钟。反过来，120分钟 = 120 ÷ 60 = 2小时。乘除法帮你在不同单位之间转换！',
 tip:'小时 → 分钟：× 60\n分钟 → 小时：÷ 60\n天 → 小时：× 24'},gen:genTimeConv},
{id:4,name:'翻倍与反转',desc:'×2 翻倍，×(-1) 掉头',emoji:'🔄',
 bg:'var(--pinkbg)',accent:'var(--pink2)',barC:'var(--pink)',
 tut:{t:'翻倍与反转',d:'×2 就是翻倍：3×2=6。×(-1) 就是"掉头"：3×(-1)=-3。那 (-1)×(-1) 呢？掉头再掉头，回到正方向！所以 = +1。',
 tip:'×2 = 翻倍\n×(-1) = 方向反转（掉头）\n负 × 负 = 正（掉头再掉头）'},gen:genFlip},
{id:5,name:'食谱配比',desc:'按比例缩放，理解倍数',emoji:'🍳',
 bg:'var(--coralbg)',accent:'var(--coral2)',barC:'var(--coral)',
 tut:{t:'食谱配比',d:'食谱写着2人份要4个鸡蛋，那3人份要几个？先算1人份：4÷2=2个，再乘3：2×3=6个。这就是"按比例缩放"——乘除法最核心的用法！',
 tip:'先除算出"1份的量"\n再乘算出"目标份数的量"\n这就是比例的基础'},gen:genRecipe},
];

/* ===== GENERATORS ===== */

function genPack(){
  const emojis=['🍎','🍊','🥚','🍪','🧁','🍩','🌰','🥝','🍇','🫐'];
  const qs=[];
  for(let i=0;i<TOTAL;i++){
    let groups,each;
    if(i<2){groups=R(2,3);each=R(2,5)}
    else if(i<4){groups=R(3,6);each=R(3,7)}
    else{groups=R(4,8);each=R(4,9)}
    const total=groups*each;
    const emoji=Rf(emojis);

    // visual: show groups (cap at 5 groups × 6 each for readability)
    let vis='<div class="groups-w">';

    if(showVisual){
      for(let g=0;g<groups;g++){
        vis+='<div class="group-bag">';
        for(let e=0;e<each;e++) vis+=`<span class="group-item">${emoji}</span>`;
        vis+='</div>';
      }

      }
    }

    const addStr=Array(groups).fill(each).join(' + ');

      text:`${groups} 袋${items}，每袋 ${each} 个，一共多少个？`,

}

        scene:vis,answer:`${total}元`,

function genTimeConv(){
  const qs=[];
  for(let i=0;i<TOTAL;i++){
    let text,ans,scene,explain;
    if(i===0){
      const h=R(2,5);ans=h*60;
      let vis='<div class="time-unit-w"><div style="font-size:28px;font-weight:700;color:var(--sky2)">'+h+' 小时</div><div class="time-blocks">';
      for(let j=0;j<h;j++) vis+=`<div class="time-block">60分钟</div>`;
      vis+='</div></div>';
      text=`${h} 小时 = 多少分钟？`;scene=vis;
      explain=`${h} × 60 = ${ans} 分钟\n每小时60分钟，${h}小时就重复${h}次。`;
      qs.push({num:`${i+1}/${TOTAL}`,text,scene,answer:`${ans}分钟`,
        options:mo(`${ans}分钟`,()=>`${ans+R(-30,30)||ans+10}分钟`),explain});
    }else if(i===1){
      const h=R(2,4);const m=h*60;
      const vis=`<div class="time-unit-w"><div style="font-size:28px;font-weight:700;color:var(--sky2)">${m} 分钟</div><div style="font-size:18px;color:var(--text3);margin:4px 0">= ? 小时</div></div>`;
      text=`${m} 分钟 = 多少小时？`;scene=vis;ans=h;
      explain=`${m} ÷ 60 = ${h} 小时\n分钟变小时就是除以60。`;
      qs.push({num:`${i+1}/${TOTAL}`,text,scene,answer:`${ans}小时`,
        options:mo(`${ans}小时`,()=>`${ans+R(-2,2)||ans+1}小时`),explain});
    }else if(i===2){
      const d=R(2,5);ans=d*24;
      let vis='<div class="time-unit-w"><div style="font-size:28px;font-weight:700;color:var(--sky2)">'+d+' 天</div><div class="time-blocks">';
      for(let j=0;j<d;j++) vis+=`<div class="time-block">24小时</div>`;
      vis+='</div></div>';
      text=`${d} 天 = 多少小时？`;scene=vis;
      explain=`${d} × 24 = ${ans} 小时\n每天24小时，${d}天就是${d}个24。`;
      qs.push({num:`${i+1}/${TOTAL}`,text,scene,answer:`${ans}小时`,
        options:mo(`${ans}小时`,()=>`${ans+R(-12,12)||ans+6}小时`),explain});
    }else if(i===3){
      const h=R(2,5);const m=h*60;const extra=R(1,3)*10;const total=m+extra;
      const vis=`<div class="time-unit-w"><div style="font-size:28px;font-weight:700;color:var(--sky2)">${total} 分钟</div><div style="font-size:14px;color:var(--text3);margin:4px 0">= ? 小时 ? 分钟</div></div>`;
      text=`${total} 分钟 = 几小时几分钟？`;scene=vis;
      const ansStr=`${h}小时${extra}分钟`;
      explain=`${total} ÷ 60 = ${h} 余 ${extra}\n所以是 ${h}小时${extra}分钟。\n除法还能算出"余数"！`;
      qs.push({num:`${i+1}/${TOTAL}`,text,scene,answer:ansStr,
        options:mo(ansStr,()=>{
          const wh=h+Rf([-1,1,2,-2]);
          const we=Rf([10,20,30,40,50].filter(v=>v!==extra));
          return `${Math.max(1,wh)}小时${we}分钟`;
        }),explain});
    }else{
      const w=R(2,4);ans=w*7;
      const vis=`<div class="time-unit-w"><div style="font-size:28px;font-weight:700;color:var(--sky2)">${w} 周</div><div style="font-size:18px;color:var(--text3);margin:4px 0">= ? 天</div></div>`;
      text=`${w} 周 = 多少天？`;scene=vis;
      explain=`${w} × 7 = ${ans} 天\n每周7天，乘法帮你快速换算。`;
      qs.push({num:`${i+1}/${TOTAL}`,text,scene,answer:`${ans}天`,
        options:mo(`${ans}天`,()=>`${ans+R(-5,5)||ans+1}天`),explain});
    }
  }
  return qs;
}

function genFlip(){
  const qs=[];
  // tier 1: positive × 2
  let a=R(2,8);
  qs.push(mkFlip(0,a,2,`${a} 的两倍是多少？`,
    `${a} × 2 = ${a*2}\n翻倍就是 ×2！`));
  // tier 2: positive × -1
  a=R(1,6);
  qs.push(mkFlip(1,a,-1,`${a} × (-1) = ?`,
    `${a} × (-1) = ${a*-1}\n×(-1) = 掉头！正变负。`));
  // tier 3: negative × -1
  a=-R(1,6);
  qs.push(mkFlip(2,a,-1,`(${a}) × (-1) = ?`,
    `(${a}) × (-1) = ${a*-1}\n负数掉头变正数！\n就像"敌人的敌人是朋友"。`));
  // tier 4: -1 × -1
  qs.push(mkFlip(3,-1,-1,`(-1) × (-1) = ?`,
    `(-1) × (-1) = 1\n🌟 这道题很重要！\n第一个 -1：面朝负方向\n× (-1)：掉头！\n掉头后面朝正方向 → +1`));
  // tier 5: negative × negative
  a=-R(2,5);const b=-R(2,4);
  qs.push(mkFlip(4,a,b,`(${a}) × (${b}) = ?`,
    `(${a}) × (${b}) = ${a*b}\n两个负号 → 掉头两次 → 回到正方向\n然后 ${-a} × ${-b} = ${a*b}`));
  return qs;
}

function mkFlip(i,a,b,text,explain){
  const ans=a*b;
  const vis=`<div class="dir-w"><div class="dir-line">
    <div class="dir-num">${a}</div>
    <div class="dir-op">× ${b<0?'('+b+')':b}</div>
    <div class="dir-arrow">→</div>
    <div class="dir-num" style="color:var(--text3)">?</div>
  </div></div>`;
  return{num:`${i+1} / ${TOTAL}`,text,scene:vis,answer:`${ans}`,
    options:mo(`${ans}`,()=>`${ans+R(-4,4)||ans+1}`),explain};
}

function genRecipe(){
  const ingredients=[
    {n:'鸡蛋',u:'个',emoji:'🥚'},{n:'面粉',u:'克',emoji:'🌾'},
    {n:'牛奶',u:'毫升',emoji:'🥛'},{n:'黄油',u:'克',emoji:'🧈'},
    {n:'糖',u:'克',emoji:'🍬'},{n:'草莓',u:'个',emoji:'🍓'}
  ];
  const qs=[];
  for(let i=0;i<TOTAL;i++){
    const ing=Rf(ingredients);
    let basePeople,perPerson,targetPeople;
    // Build from perPerson to guarantee clean integers
    if(i<2){
      // easy: base=2, small per-person
      basePeople=2;perPerson=R(2,5);targetPeople=R(3,6);
    }else if(i<4){
      // medium: base=3 or 4
      basePeople=Rf([3,4]);perPerson=R(2,4);targetPeople=Rf([2,3,5,6]);
    }else{
      // harder: bigger numbers
      basePeople=Rf([2,3,4]);perPerson=R(2,5);targetPeople=R(5,8);
    }
    // Ensure target != base (otherwise the answer = baseAmt, too obvious)
    if(targetPeople===basePeople) targetPeople=basePeople+1;
    const baseAmt=perPerson*basePeople;
    const ans=perPerson*targetPeople;
    const vis=`<div class="recipe-w">
      <div class="recipe-card-v">${ing.emoji} 食谱（<b>${basePeople}人份</b>）<br>${ing.n}：<b>${baseAmt}${ing.u}</b></div>
      <div class="recipe-arrow">↓ 换算成 ↓</div>
      <div class="recipe-q">${targetPeople}人份 = ?${ing.u}</div>
    </div>`;
    qs.push({num:`${i+1} / ${TOTAL}`,
      text:`食谱 ${basePeople} 人份需要 ${baseAmt}${ing.u}${ing.n}，${targetPeople} 人份需要多少？`,
      scene:vis,answer:`${ans}${ing.u}`,
      options:mo(`${ans}${ing.u}`,()=>{
        // Generate plausible wrong answers: common mistakes
        const wrongs=[baseAmt*targetPeople, baseAmt+targetPeople, baseAmt, perPerson, ans+perPerson, ans-perPerson, ans+basePeople, ans-basePeople];
        const filtered=wrongs.filter(w=>w>0&&w!==ans&&Number.isInteger(w));
        if(filtered.length>0) return `${Rf(filtered)}${ing.u}`;
        let w=ans+R(1,5)*(Math.random()>.5?1:-1);
        if(w<=0)w=ans+R(1,5);
        return `${w}${ing.u}`;
      }),
      explain:`先算1人份：${baseAmt} ÷ ${basePeople} = ${perPerson}${ing.u}\n再算${targetPeople}人份：${perPerson} × ${targetPeople} = ${ans}${ing.u}\n先除再乘——这就是按比例缩放！`});
  }
  return qs;
}

function pick(btn,val){
  if(S.done)return;S.done=true;
  const q=S.qs[S.qi];const ok=val===q.answer;
  document.querySelectorAll('.opt').forEach(b=>{if(b.textContent===q.answer)b.classList.add('ok');b.style.pointerEvents='none'});
  if(ok){
    S.combo++;S.mcombo=Math.max(S.mcombo,S.combo);S.cor++;
    const bn=S.combo>=3?S.combo:0;S.pts+=5+bn;
    document.getElementById('gPts').textContent='✿ '+S.pts;
    spawnFB(btn,Rf(['✨','💫','🌟','✿','♪']));
    if(S.combo>=3)toast('连对 '+S.combo+' 题！✿');
  }else{btn.classList.add('no');S.combo=0}
  const cheer=ok?Rf(cheers):Rf(encourages);
  const ex=document.getElementById('expl');
  const lines=q.explain.split('\n');
  ex.innerHTML=`<div class="e-mascot"><div class="e-icon">☁️</div><div class="e-body"><div class="e-h ${ok?'ok':'no'}">${cheer}</div><div class="e-math">${lines[0]}</div>${lines.length>1?`<div style="color:var(--text2);font-size:12px;margin-top:4px">${lines.slice(1).join('<br>')}</div>`:''}</div></div>`;
  ex.style.display='block';

}

  const mx=SC.length*3;
  const acc=S.prog.totalPlayed>0?Math.round((S.prog.totalCorrect/S.prog.totalPlayed)*100):0;
  const perfect=ts===mx;
  const msgs=perfect
    ?['乘除法全部满星通关！✿✿✿','数学小天才就是你 🌈']
    :['六个场景全部通关！继续冲刺满星吧 ✿','你已经走了很远了，为自己骄傲 ♡'];
  document.getElementById('shareBody').innerHTML=`
    <div class="share-card-el">
      <div class="share-logo">☁️</div>
      <div class="share-title">Numby · 乘除篇 成就卡</div>
      <div class="share-date">${ds}</div>
      <div class="share-grid">${SC.map((sc,i)=>{
        const st=S.prog.stars[i]||0;
        return`<div class="share-sc"><div class="share-sc-emoji">${sc.emoji}</div><div class="share-sc-name">${sc.name}</div><div class="share-sc-stars" style="color:${sc.accent}">${'★'.repeat(st)}${'☆'.repeat(3-st)}</div></div>`;
      }).join('')}</div>
      <div class="share-big">
        <div class="share-stat"><div class="share-stat-v" style="color:var(--pink2)">${ts}/${mx}</div><div class="share-stat-l">总星星</div></div>
        <div class="share-stat"><div class="share-stat-v" style="color:var(--lilac2)">${acc}%</div><div class="share-stat-l">总正确率</div></div>
        <div class="share-stat"><div class="share-stat-v" style="color:var(--mint2)">${S.prog.totalPlayed||0}</div><div class="share-stat-l">总题数</div></div>
      </div>
      <div class="share-msg">${Rf(msgs)}</div>
      <div class="share-brand">Numby · 乘除篇 · ${ds}</div>
    </div>
    <div class="share-hint">📱 长按截图保存，分享给老师或朋友看看吧～</div>
    <div class="share-btns">
      <button class="btn-main" style="background:linear-gradient(135deg,var(--peach),var(--pink))" onclick="goHome()">回到主页</button>
      <button class="btn-alt" onclick="resetAll()">全部重置（重新挑战）</button>
    </div>`;
  show('scrShare');
}

function resetAll(){
  if(!confirm('确定要重置所有进度吗？星星和记录会全部清零。'))return;
  S.prog={stars:{},unlocked:[0,1],totalCorrect:0,totalPlayed:0};sp();goHome();
}
function goHome(){renderHome()}
renderHome();
</script>
</body>
</html>
