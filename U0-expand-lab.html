<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>展开实验室 · Expanding Brackets</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --electric:#4F46E5;--electric-dk:#3730A3;--electric-lt:#EEF2FF;
  --mint:#10B981;--mint-lt:#D1FAE5;
  --orange:#F59E0B;--orange-lt:#FEF3C7;
  --pink:#EC4899;--pink-lt:#FCE7F3;
  --cyan:#06B6D4;--cyan-lt:#CFFAFE;
  --slate:#1E293B;--slate-m:#64748B;
  --bg:#F8FAFC;--white:#FFFFFF;
  --gold:#FBBF24;--green:#22C55E;--green-lt:#DCFCE7;
  --shadow-s:0 2px 12px rgba(30,41,59,.06);
  --shadow-m:0 6px 24px rgba(30,41,59,.10);
  --r:14px;--r-lg:20px;
}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--slate);overflow-x:hidden;min-height:100vh;-webkit-tap-highlight-color:transparent}
.screen{display:none;min-height:100vh;flex-direction:column}.screen.active{display:flex}

/* WELCOME */
.welcome{align-items:center;justify-content:center;background:linear-gradient(150deg,#EEF2FF 0%,#E0E7FF 30%,#C7D2FE 60%,#A5B4FC 100%);position:relative;overflow:hidden;padding:40px 24px}
.w-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(79,70,229,.06) 1px,transparent 1px),linear-gradient(90deg,rgba(79,70,229,.06) 1px,transparent 1px);background-size:40px 40px}
.w-shapes{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.w-sh{position:absolute;border:2px solid rgba(79,70,229,.1);border-radius:8px;animation:wFloat 10s ease-in-out infinite}
@keyframes wFloat{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-25px) rotate(5deg)}}
.w-box{position:relative;z-index:2;text-align:center;max-width:500px}
.w-badge{display:inline-block;padding:6px 16px;border-radius:100px;background:rgba(79,70,229,.1);border:1px solid rgba(79,70,229,.2);font-size:11px;font-weight:700;color:var(--electric);letter-spacing:1.5px;margin-bottom:20px}
.w-title{font-size:clamp(36px,9vw,60px);font-weight:700;line-height:1.08;color:var(--slate);margin-bottom:8px}
.w-title em{font-style:normal;color:var(--electric)}
.w-eq{display:inline-block;margin:12px 0 20px;font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:600;color:var(--electric);letter-spacing:1px;background:var(--white);padding:10px 24px;border-radius:10px;box-shadow:var(--shadow-s)}
.w-sub{font-size:16px;color:var(--slate-m);font-weight:500;line-height:1.7;margin-bottom:36px}
.w-sub small{display:block;font-size:13px;margin-top:6px;opacity:.6}
.btn-go{display:inline-flex;align-items:center;gap:10px;background:var(--electric);color:#fff;border:none;padding:16px 42px;border-radius:100px;font-size:18px;font-weight:700;font-family:inherit;cursor:pointer;box-shadow:0 8px 28px rgba(79,70,229,.3);transition:all .3s cubic-bezier(.34,1.56,.64,1)}
.btn-go:hover{transform:translateY(-3px);box-shadow:0 14px 36px rgba(79,70,229,.4)}.btn-go:active{transform:scale(.97)}

/* MAP */
.map-s{background:linear-gradient(180deg,var(--electric-lt) 0%,var(--bg) 100%);padding:0}
.mt{padding:18px 22px;display:flex;align-items:center;justify-content:space-between}
.mt-h{font-size:20px;font-weight:700}.mt-st{display:flex;align-items:center;gap:5px;background:var(--orange-lt);padding:7px 14px;border-radius:100px;font-weight:700;color:#D97706;font-size:14px}
.ml{flex:1;padding:6px 18px 36px;overflow-y:auto;display:flex;flex-direction:column;gap:12px}
.zc{background:var(--white);border-radius:var(--r-lg);padding:20px;box-shadow:var(--shadow-s);cursor:pointer;display:flex;align-items:center;gap:14px;border:2px solid transparent;transition:all .3s cubic-bezier(.34,1.56,.64,1)}
.zc:hover{transform:translateY(-2px);box-shadow:var(--shadow-m)}.zc:active{transform:scale(.98)}
.zc.lk{opacity:.4;pointer-events:none;filter:grayscale(.3)}.zc.dn{border-color:var(--green)}.zc.nw{border-color:var(--electric);animation:zcP 2s ease-in-out infinite}
@keyframes zcP{0%,100%{box-shadow:var(--shadow-s),0 0 0 0 rgba(79,70,229,.1)}50%{box-shadow:var(--shadow-s),0 0 0 8px rgba(79,70,229,.04)}}
.zi{width:50px;height:50px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;font-weight:700;font-family:'JetBrains Mono',monospace;line-height:1.2;text-align:center}
.zb{flex:1}.zn{font-size:15px;font-weight:700;margin-bottom:2px}.zd{font-size:11px;color:var(--slate-m);font-weight:500}
.zdots{display:flex;gap:4px;margin-top:6px}.zdt{width:8px;height:8px;border-radius:50%;background:#E2E8F0;transition:.3s}.zdt.on{background:var(--gold)}.zdt.cu{background:var(--electric);animation:dp 1.4s ease-in-out infinite}
@keyframes dp{0%,100%{transform:scale(1)}50%{transform:scale(1.4)}}
.zr{text-align:right;flex-shrink:0}.zsv{font-size:12px;font-weight:700;color:#D97706}

/* GAME */
.game-s{background:var(--bg);padding:0}
.gh{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;background:var(--white);box-shadow:0 1px 8px rgba(0,0,0,.03)}
.gh-b{background:none;border:none;font-size:14px;font-weight:600;color:var(--slate-m);cursor:pointer;font-family:inherit;padding:8px}
.gh-z{font-size:12px;font-weight:700;color:var(--electric)}
.gh-l{font-size:12px;font-weight:600;color:var(--slate-m)}
.gbd{flex:1;display:flex;flex-direction:column;align-items:center;padding:14px 14px 24px;overflow-y:auto}
.gds{display:flex;gap:8px;margin-bottom:14px}
.gd{width:10px;height:10px;border-radius:50%;background:#E2E8F0;transition:.4s cubic-bezier(.34,1.56,.64,1)}.gd.done{background:var(--green);transform:scale(1.1)}.gd.act{background:var(--electric);transform:scale(1.3);box-shadow:0 0 0 4px rgba(79,70,229,.15)}

/* area model canvas */
.area-wrap{width:100%;max-width:440px;background:var(--white);border-radius:var(--r-lg);box-shadow:var(--shadow-m);padding:16px;margin-bottom:12px;overflow:hidden}
.area-canvas{display:block;width:100%;border-radius:8px}

/* collect row */
.collect-row{width:100%;max-width:440px;background:var(--white);border-radius:var(--r);padding:14px 18px;box-shadow:var(--shadow-s);margin-bottom:12px;text-align:center;min-height:52px;display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:4px}
.collect-label{font-size:10px;font-weight:700;color:var(--slate-m);letter-spacing:1px;margin-bottom:4px;width:100%}
.term-chip{display:inline-block;padding:4px 10px;border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:clamp(14px,3.5vw,17px);font-weight:700;opacity:0;transform:translateY(8px);transition:all .4s cubic-bezier(.34,1.56,.64,1)}
.term-chip.show{opacity:1;transform:translateY(0)}
.plus-chip{display:inline-block;padding:4px 2px;font-size:16px;font-weight:700;color:var(--slate-m);opacity:0;transition:opacity .3s}.plus-chip.show{opacity:1}

/* equation display */
.eq-card{background:var(--white);border-radius:var(--r);padding:14px 20px;box-shadow:var(--shadow-s);text-align:center;max-width:440px;width:100%;margin-bottom:10px;position:relative;overflow:hidden}
.eq-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--electric),var(--mint),var(--electric))}
.eq-lbl{font-size:10px;font-weight:700;color:var(--electric);letter-spacing:1px;margin-bottom:4px}
.eq-text{font-family:'JetBrains Mono',monospace;font-size:clamp(22px,5vw,32px);font-weight:700;color:var(--slate);letter-spacing:1px}

.opts{display:grid;grid-template-columns:1fr 1fr;gap:9px;max-width:440px;width:100%}
.opts.single-col{grid-template-columns:1fr}
.ob{background:var(--white);border:2px solid #E2E8F0;border-radius:var(--r);padding:14px 10px;font-size:clamp(14px,3.5vw,18px);font-weight:600;font-family:'JetBrains Mono',monospace;color:var(--slate);cursor:pointer;transition:all .25s cubic-bezier(.34,1.56,.64,1);text-align:center;line-height:1.4}
.ob:hover{border-color:var(--electric);transform:translateY(-2px);box-shadow:var(--shadow-s)}.ob:active{transform:scale(.96)}
.ob.ok{background:var(--green-lt);border-color:var(--green);color:#166534;animation:okP .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes okP{0%{transform:scale(.9)}50%{transform:scale(1.06)}100%{transform:scale(1)}}
.ob.nope{animation:nSh .45s ease;opacity:.3;pointer-events:none}
@keyframes nSh{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
.ob.off{opacity:.25;pointer-events:none}
.g-hint{margin-top:10px;font-size:13px;color:var(--electric);font-weight:600;min-height:20px;max-width:440px;text-align:center;line-height:1.5}
.streak-bx{position:fixed;top:68px;right:14px;background:linear-gradient(135deg,var(--orange),var(--gold));color:var(--slate);padding:7px 14px;border-radius:100px;font-weight:700;font-size:12px;box-shadow:var(--shadow-m);z-index:50;display:none}
.streak-bx.on{display:block;animation:sbI .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes sbI{0%{transform:translateX(80px) scale(.5);opacity:0}100%{transform:translateX(0) scale(1);opacity:1}}

/* RESULT */
.res-s{align-items:center;justify-content:center;background:linear-gradient(150deg,#EEF2FF 0%,#C7D2FE 50%,#A5B4FC 100%);padding:40px 24px;text-align:center;position:relative;overflow:hidden}
.rs-st{display:flex;gap:12px;margin-bottom:20px}
.rs{width:48px;height:48px;opacity:0;transform:scale(0) rotate(-25deg)}.rs.got{animation:sE .6s cubic-bezier(.34,1.56,.64,1) forwards}
.rs:nth-child(2).got{animation-delay:.2s}.rs:nth-child(3).got{animation-delay:.4s}
@keyframes sE{0%{opacity:0;transform:scale(0) rotate(-25deg)}100%{opacity:1;transform:scale(1) rotate(0)}}
.rs svg{width:100%;height:100%}
.rs-t{font-size:26px;font-weight:700;margin-bottom:6px;animation:fU .6s ease .5s both}
.rs-msg{font-size:14px;color:var(--slate-m);font-weight:500;margin-bottom:10px;animation:fU .6s ease .6s both;line-height:1.6}
.rs-row{display:flex;gap:24px;margin:20px 0 30px;animation:fU .6s ease .7s both}
.rv{font-size:22px;font-weight:700;color:var(--electric)}.rl{font-size:11px;color:var(--slate-m);font-weight:600}
@keyframes fU{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.btn-n{background:var(--electric);color:#fff;border:none;padding:14px 40px;border-radius:100px;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;box-shadow:0 8px 24px rgba(79,70,229,.3);transition:all .3s;animation:fU .6s ease .8s both}
.btn-n:hover{transform:translateY(-2px)}.btn-n:active{transform:scale(.97)}
.btn-s2{background:transparent;color:var(--slate-m);border:2px solid rgba(79,70,229,.2);padding:10px 26px;border-radius:100px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .3s;animation:fU .6s ease .9s both;margin-top:10px}
.btn-s2:hover{border-color:var(--electric);color:var(--electric)}

/* particles */
.ptc-b{position:fixed;inset:0;pointer-events:none;z-index:1000;overflow:hidden}
.ptc{position:absolute;border-radius:50%;animation:ptcF 1s ease-out forwards}
@keyframes ptcF{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0)}}
.big-ok{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);width:84px;height:84px;z-index:999;pointer-events:none}
.big-ok.go{animation:bP .8s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes bP{0%{transform:translate(-50%,-50%) scale(0);opacity:0}40%{transform:translate(-50%,-50%) scale(1.15);opacity:1}100%{transform:translate(-50%,-50%) scale(0);opacity:0}}

@media(max-width:480px){.area-wrap{padding:10px}.opts{gap:7px}.ob{padding:11px 6px;font-size:clamp(13px,3.2vw,16px)}}
</style>
</head>
<body>
<div class="ptc-b" id="ptcB"></div>
<div class="big-ok" id="bigOk"><svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="48" fill="#22C55E"/><path d="M30 52L45 67L72 35" fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/></svg></div>

<!-- WELCOME -->
<div class="screen welcome active" id="scnW">
  <div class="w-grid"></div>
  <div class="w-shapes">
    <div class="w-sh" style="width:120px;height:80px;top:12%;left:5%;animation-delay:0s"></div>
    <div class="w-sh" style="width:90px;height:60px;top:55%;right:8%;animation-delay:3s"></div>
    <div class="w-sh" style="width:70px;height:50px;bottom:18%;left:15%;animation-delay:6s"></div>
  </div>
  <div class="w-box">
    <div class="w-badge">U → E · EDEXCEL PURE 1</div>
    <h1 class="w-title">展开<em>实验室</em></h1>
    <div class="w-eq">2(x + 3) → 2x + 6</div>
    <p class="w-sub">括号就像一个矩形——展开它，看看面积是多少<small>每道题都有面积模型帮你理解"为什么要这样乘"</small></p>
    <button class="btn-go" onclick="enterMap()">开始实验 →</button>
  </div>
</div>

<!-- MAP -->
<div class="screen map-s" id="scnM">
  <div class="mt"><h2 class="mt-h">实验地图</h2><div class="mt-st"><svg width="18" height="18" viewBox="0 0 24 24" fill="#FBBF24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg><span id="allSt">0</span></div></div>
  <div class="ml" id="mL"></div>
</div>

<!-- GAME -->
<div class="screen game-s" id="scnG">
  <div class="gh"><button class="gh-b" onclick="toMap()">← 返回</button><span class="gh-z" id="ghZ"></span><span class="gh-l" id="ghL"></span></div>
  <div class="gbd">
    <div class="gds" id="gDs"></div>
    <div class="eq-card"><div class="eq-lbl">EXPAND 展开</div><div class="eq-text" id="eqTxt"></div></div>
    <div class="area-wrap" id="areaWrap">
      <canvas class="area-canvas" id="areaCanvas"></canvas>
    </div>
    <div class="collect-row" id="collectRow"></div>
    <div class="opts" id="optsG"></div>
    <div class="g-hint" id="gHint"></div>
  </div>
  <div class="streak-bx" id="strkB"></div>
</div>

<!-- RESULT -->
<div class="screen res-s" id="scnR">
  <div class="rs-st" id="rsSt"></div>
  <h2 class="rs-t" id="rsT"></h2>
  <p class="rs-msg" id="rsMsg"></p>
  <div class="rs-row"><div><div class="rv" id="rvO">0</div><div class="rl">答对</div></div><div><div class="rv" id="rvS">0</div><div class="rl">最长连击</div></div></div>
  <button class="btn-n" id="btnN" onclick="goNxt()">继续实验</button>
  <button class="btn-s2" onclick="toMap()">返回地图</button>
</div>

<script>
/* ======================================================================
   TERM UTILITIES
   ====================================================================== */
function fmtTerm(coeff, power){
  if(coeff===0) return '0';
  if(power===0) return String(coeff);
  if(power===1){
    if(coeff===1) return 'x';
    if(coeff===-1) return '−x';
    return coeff+'x';
  }
  if(coeff===1) return 'x²';
  if(coeff===-1) return '−x²';
  return coeff+'x²';
}

function fmtPoly(terms){
  if(terms.length===0) return '0';
  let s='';
  terms.forEach((t,i)=>{
    if(t.coeff===0) return;
    if(i===0) s+=fmtTerm(t.coeff,t.power);
    else if(t.coeff>0) s+=' + '+fmtTerm(t.coeff,t.power);
    else s+=' − '+fmtTerm(Math.abs(t.coeff),t.power);
  });
  return s||'0';
}

function polyToStr(terms){
  return fmtPoly([...terms].sort((a,b)=>b.power-a.power));
}

function combineTerms(terms){
  const map={};
  terms.forEach(t=>{map[t.power]=(map[t.power]||0)+t.coeff});
  const r=[];
  Object.keys(map).sort((a,b)=>b-a).forEach(p=>{if(map[p]!==0)r.push({coeff:map[p],power:+p})});
  return r;
}

/* ======================================================================
   CELL COLORS — rich distinct fills for area rectangles
   ====================================================================== */
const CELL_STYLES = [
  { fill:'rgba(79,70,229,.15)',  stroke:'#4F46E5', text:'#3730A3', label:'indigo'  },
  { fill:'rgba(16,185,129,.15)', stroke:'#10B981', text:'#065F46', label:'emerald' },
  { fill:'rgba(245,158,11,.15)', stroke:'#F59E0B', text:'#92400E', label:'amber'   },
  { fill:'rgba(236,72,153,.15)', stroke:'#EC4899', text:'#9D174D', label:'pink'    },
];

/* ======================================================================
   ZONES
   ====================================================================== */
const ZONES=[
  {
    id:'s1',name:'单括号 · 正数',desc:'a(x + b) — 最基础的展开',
    color:'#4F46E5',bg:'#EEF2FF',icon:'a(…)',levels:6,
    gen(l){
      const a=ri(2,3+Math.floor(l*.8)), b=ri(1,4+l);
      return mkQ(`${a}(x + ${b})`,[{label:String(a)}],[{label:'x',power:1},{label:String(b),power:0}],
        [[{coeff:a,power:1},{coeff:a*b,power:0}]],
        `${a} × x = ${fmtTerm(a,1)}，${a} × ${b} = ${a*b}`);
    }
  },
  {
    id:'s2',name:'单括号 · 负数',desc:'a(x − b) — 注意负号！',
    color:'#EC4899',bg:'#FCE7F3',icon:'a(x−b)',levels:6,
    gen(l){
      const a=ri(2,3+Math.floor(l*.8)), b=ri(1,4+l);
      return mkQ(`${a}(x − ${b})`,[{label:String(a)}],[{label:'x',power:1},{label:'−'+b,power:0}],
        [[{coeff:a,power:1},{coeff:-a*b,power:0}]],
        `${a} × x = ${fmtTerm(a,1)}，${a} × (−${b}) = −${a*b}，负号别忘！`);
    }
  },
  {
    id:'d1',name:'双括号 · 正项',desc:'(x + a)(x + b) — FOIL 法则',
    color:'#10B981',bg:'#D1FAE5',icon:'(…)(…)',levels:6,
    gen(l){
      const a=ri(1,3+l), b=ri(1,3+l);
      return mkQ(`(x + ${a})(x + ${b})`,
        [{label:'x'},{label:String(a)}],[{label:'x',power:1},{label:String(b),power:0}],
        [[{coeff:1,power:2},{coeff:b,power:1}],[{coeff:a,power:1},{coeff:a*b,power:0}]],
        `x·x=x², x·${b}=${b}x, ${a}·x=${a}x, ${a}·${b}=${a*b}，合并 ${b}x+${a}x=${a+b}x`);
    }
  },
  {
    id:'d2',name:'双括号 · 含负项',desc:'(x + a)(x − b) — 正负交锋',
    color:'#F59E0B',bg:'#FEF3C7',icon:'(+)(−)',levels:6,
    gen(l){
      const a=ri(1,3+l), b=ri(1,3+l);
      return mkQ(`(x + ${a})(x − ${b})`,
        [{label:'x'},{label:String(a)}],[{label:'x',power:1},{label:'−'+b,power:0}],
        [[{coeff:1,power:2},{coeff:-b,power:1}],[{coeff:a,power:1},{coeff:-a*b,power:0}]],
        `x·(−${b})=−${b}x, ${a}·x=${a}x, 合并: ${a-b===0?'互相抵消':fmtTerm(a-b,1)}`);
    }
  },
  {
    id:'sq',name:'完全平方',desc:'(x + a)² — 经典公式',
    color:'#06B6D4',bg:'#CFFAFE',icon:'(…)²',levels:6,
    gen(l){
      const a=ri(1,3+Math.floor(l*.7));
      const neg=l>=3&&Math.random()>.5;
      const av=neg?-a:a;
      const lb=neg?'−'+a:String(a);
      return mkQ(neg?`(x − ${a})²`:`(x + ${a})²`,
        [{label:'x'},{label:lb}],[{label:'x',power:1},{label:lb,power:0}],
        [[{coeff:1,power:2},{coeff:av,power:1}],[{coeff:av,power:1},{coeff:av*av,power:0}]],
        neg?`(x−${a})² = x² − 2·${a}·x + ${a}² = x² − ${2*a}x + ${a*a}`
          :`(x+${a})² = x² + 2·${a}·x + ${a}² = x² + ${2*a}x + ${a*a}`);
    }
  },
  {
    id:'mix',name:'综合实验室',desc:'全类型混合，终极挑战',
    color:'#7C3AED',bg:'#EDE9FE',icon:'MIX',levels:8,
    gen(l){return ZONES[ri(0,4)].gen(l)}
  }
];

function mkQ(expr, left, top, cells, hint){
  const rawTerms=[];
  cells.forEach(row=>row.forEach(c=>rawTerms.push({coeff:c.coeff,power:c.power})));
  const combined=combineTerms(rawTerms);
  const answer=polyToStr(combined);
  return{expr,left,top,cells,rawTerms,answer,hint,combined};
}

const QPL=5;
const CHEERS=['太棒了！括号在你手中毫无秘密！','完美展开！你是实验室之星！','了不起！面积模型已被你掌握！','每一次展开都让你更强！','你的速度令人惊叹！','展开高手就是你！','继续下去，没有括号能难倒你！','你已经理解了展开的本质！'];
const OK_W=['正确!','太棒了!','完美!','漂亮!','没错!','好厉害!','Correct!','Well done!'];

/* STATE */
let st=loadS();
function defS(){return{zones:ZONES.map(z=>({id:z.id,levels:Array(z.levels).fill(0)})),total:0}}
function loadS(){try{const s=JSON.parse(localStorage.getItem('expandLab2'));if(s&&s.zones)return s}catch(e){}return defS()}
function saveS(){st.total=st.zones.reduce((a,z)=>a+z.levels.reduce((s,v)=>s+v,0),0);localStorage.setItem('expandLab2',JSON.stringify(st))}
let cZ=0,cL=0,qs=[],qi=0,correct=0,streak=0,maxSk=0,attempts=0,answered=false;

/* HELPERS */
function ri(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function shuf(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=ri(0,i);[r[i],r[j]]=[r[j],r[i]]}return r}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}
function burst(x,y,n=20){const box=document.getElementById('ptcB');const cs=['#4F46E5','#10B981','#F59E0B','#EC4899','#06B6D4','#FBBF24','#7C3AED'];for(let i=0;i<n;i++){const p=document.createElement('div');p.className='ptc';const sz=ri(5,11),ang=(Math.PI*2*i)/n+Math.random()*.5,d=ri(50,140);const tx=Math.cos(ang)*d,ty=Math.sin(ang)*d-30;p.style.cssText=`width:${sz}px;height:${sz}px;background:${cs[i%cs.length]};left:${x}px;top:${y}px;--tx:${tx}px;--ty:${ty}px`;box.appendChild(p);setTimeout(()=>p.remove(),1000)}}
function showCk(){const e=document.getElementById('bigOk');e.classList.remove('go');void e.offsetWidth;e.classList.add('go');setTimeout(()=>e.classList.remove('go'),900)}
function updStrk(){const b=document.getElementById('strkB');if(streak>=3){b.textContent=`🔥 ×${streak}`;b.classList.add('on');b.style.animation='none';void b.offsetWidth;b.style.animation=''}else b.classList.remove('on')}

/* ======================================================================
   CANVAS AREA MODEL — the real visual rectangle diagram
   ====================================================================== */
let areaRevealProgress = 0; // 0 = hidden, then counts up cells revealed
let areaAnimTimer = null;

function drawAreaModel(q, revealCount){
  const canvas = document.getElementById('areaCanvas');
  const wrap = canvas.parentElement;
  const W = wrap.clientWidth - 32; // account for padding
  const rows = q.cells.length;
  const cols = q.cells[0].length;

  // Canvas sizing: taller for double brackets
  const ratio = rows === 1 ? 0.45 : 0.65;
  const H = Math.round(W * ratio);
  const dpr = window.devicePixelRatio || 2;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  // Layout
  const labelPadL = 60;  // left label area
  const labelPadT = 44;  // top label area
  const padR = 12;
  const padB = 12;
  const gridW = W - labelPadL - padR;
  const gridH = H - labelPadT - padB;

  // Column widths: first col (x term) wider, second col (constant) narrower
  const colRatios = cols === 2 ? [0.6, 0.4] : [1];
  const colWidths = colRatios.map(r => gridW * r);
  // Row heights: equal
  const rowH = gridH / rows;

  // Clear
  ctx.clearRect(0, 0, W, H);

  // ---- Draw top dimension labels (bracket terms on top) ----
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  let cx = labelPadL;
  q.top.forEach((t, ci) => {
    const cw = colWidths[ci];
    const midX = cx + cw / 2;

    // Bracket line above
    ctx.strokeStyle = '#94A3B8';
    ctx.lineWidth = 1.5;
    const bY = 8;
    ctx.beginPath();
    ctx.moveTo(cx + 6, labelPadT - 10);
    ctx.lineTo(cx + 6, bY);
    ctx.lineTo(cx + cw - 6, bY);
    ctx.lineTo(cx + cw - 6, labelPadT - 10);
    ctx.stroke();

    // Label
    ctx.font = '700 16px "JetBrains Mono"';
    ctx.fillStyle = CELL_STYLES[ci % CELL_STYLES.length].text;
    ctx.fillText(t.label, midX, labelPadT / 2 + 6);

    cx += cw;
  });

  // ---- Draw left dimension labels (bracket terms on left) ----
  let ry = labelPadT;
  q.left.forEach((t, ri_) => {
    const midY = ry + rowH / 2;

    // Bracket line
    ctx.strokeStyle = '#94A3B8';
    ctx.lineWidth = 1.5;
    const bX = 6;
    ctx.beginPath();
    ctx.moveTo(labelPadL - 10, ry + 6);
    ctx.lineTo(bX, ry + 6);
    ctx.lineTo(bX, ry + rowH - 6);
    ctx.lineTo(labelPadL - 10, ry + rowH - 6);
    ctx.stroke();

    // Label
    ctx.font = '700 16px "JetBrains Mono"';
    ctx.fillStyle = CELL_STYLES[(ri_ + 2) % CELL_STYLES.length].text;
    ctx.textAlign = 'center';
    ctx.fillText(t.label, labelPadL / 2 + 3, midY);

    ry += rowH;
  });

  // ---- Draw × symbol ----
  ctx.font = '700 18px "Space Grotesk"';
  ctx.fillStyle = '#94A3B8';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('×', labelPadL / 2 + 3, labelPadT / 2 + 6);

  // ---- Draw grid outline (always visible) ----
  ctx.strokeStyle = '#CBD5E1';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.roundRect(labelPadL, labelPadT, gridW, gridH, 8);
  ctx.stroke();

  // Inner grid lines
  if(cols === 2){
    const splitX = labelPadL + colWidths[0];
    ctx.beginPath();
    ctx.moveTo(splitX, labelPadT);
    ctx.lineTo(splitX, labelPadT + gridH);
    ctx.stroke();
  }
  if(rows === 2){
    const splitY = labelPadT + rowH;
    ctx.beginPath();
    ctx.moveTo(labelPadL, splitY);
    ctx.lineTo(labelPadL + gridW, splitY);
    ctx.stroke();
  }

  // ---- Draw filled rectangles for revealed cells ----
  let cellIdx = 0;
  ry = labelPadT;
  for(let r = 0; r < rows; r++){
    cx = labelPadL;
    for(let c = 0; c < cols; c++){
      const cw = colWidths[c];
      const style = CELL_STYLES[cellIdx % CELL_STYLES.length];
      const cell = q.cells[r][c];
      const termStr = fmtTerm(cell.coeff, cell.power);

      if(cellIdx < revealCount){
        // Draw filled rectangle with color
        ctx.fillStyle = style.fill;
        const inset = 3;
        ctx.beginPath();
        ctx.roundRect(cx + inset, ry + inset, cw - inset*2, rowH - inset*2, 6);
        ctx.fill();

        // Thicker colored border
        ctx.strokeStyle = style.stroke;
        ctx.lineWidth = 2.5;
        ctx.stroke();

        // Product label inside rectangle
        ctx.font = '700 '+Math.min(22, cw/4)+'px "JetBrains Mono"';
        ctx.fillStyle = style.text;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(termStr, cx + cw/2, ry + rowH/2);

        // Small multiplication annotation above the product
        const leftLabel = q.left[r].label;
        const topLabel = q.top[c].label;
        const mulStr = leftLabel + ' × ' + topLabel;
        ctx.font = '600 '+Math.min(11, cw/7)+'px "Space Grotesk"';
        ctx.fillStyle = style.stroke;
        ctx.globalAlpha = 0.6;
        ctx.fillText(mulStr, cx + cw/2, ry + 16);
        ctx.globalAlpha = 1;
      } else {
        // Unrevealed: show question mark
        ctx.fillStyle = '#F1F5F9';
        const inset = 3;
        ctx.beginPath();
        ctx.roundRect(cx + inset, ry + inset, cw - inset*2, rowH - inset*2, 6);
        ctx.fill();

        ctx.font = '700 24px "Space Grotesk"';
        ctx.fillStyle = '#CBD5E1';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('?', cx + cw/2, ry + rowH/2);
      }

      cellIdx++;
      cx += cw;
    }
    ry += rowH;
  }
}

function animateAreaReveal(q){
  const totalCells = q.cells.length * q.cells[0].length;
  areaRevealProgress = 0;
  drawAreaModel(q, 0);

  if(areaAnimTimer) clearInterval(areaAnimTimer);
  areaAnimTimer = setInterval(()=>{
    areaRevealProgress++;
    drawAreaModel(q, areaRevealProgress);
    if(areaRevealProgress >= totalCells){
      clearInterval(areaAnimTimer);
      areaAnimTimer = null;
    }
  }, 350);
}

function revealAllCells(q){
  if(areaAnimTimer) clearInterval(areaAnimTimer);
  areaAnimTimer = null;
  const totalCells = q.cells.length * q.cells[0].length;
  areaRevealProgress = totalCells;
  drawAreaModel(q, totalCells);
}

/* ======================================================================
   COLLECT ROW
   ====================================================================== */
function renderCollect(q, showIt){
  const row = document.getElementById('collectRow');
  if(!showIt){
    row.innerHTML='<div class="collect-label">展开结果 = ?</div>';
    return;
  }
  let html='<div class="collect-label">合并同类项</div>';
  q.combined.forEach((t,i)=>{
    const style = CELL_STYLES[i % CELL_STYLES.length];
    if(i>0){
      const sign = t.coeff > 0 ? '+' : '−';
      html+=`<span class="plus-chip show">${sign}</span>`;
      html+=`<span class="term-chip show" style="background:${style.fill};color:${style.text};border:1.5px solid ${style.stroke}">${fmtTerm(Math.abs(t.coeff),t.power)}</span>`;
    } else {
      html+=`<span class="term-chip show" style="background:${style.fill};color:${style.text};border:1.5px solid ${style.stroke}">${fmtTerm(t.coeff,t.power)}</span>`;
    }
  });
  row.innerHTML=html;
}

/* ======================================================================
   GENERATE Qs
   ====================================================================== */
function genQs(zone,lvl){
  const questions=[];
  for(let i=0;i<QPL;i++){
    const q=zone.gen(lvl);
    const dists=new Set([q.answer]);
    let safe=0;
    while(dists.size<4&&safe<80){
      const mod=[...q.combined];
      const r=Math.random();
      if(r<.25&&mod.length>0){
        const idx=ri(0,mod.length-1);
        const m=[...mod];m[idx]={...m[idx],coeff:m[idx].coeff+(Math.random()>.5?1:-1)*ri(1,3)};
        dists.add(polyToStr(m));
      } else if(r<.5){
        const m=mod.map(t=>({...t}));
        const idx=ri(0,m.length-1);
        if(m[idx].power===0||m[idx].power===1) m[idx].coeff=-m[idx].coeff;
        dists.add(polyToStr(m));
      } else if(r<.75){
        const m=mod.filter(t=>t.power!==1||Math.random()>.5);
        if(m.length>0) dists.add(polyToStr(m.length===mod.length?mod.map((t,i)=>i===mod.length-1?{...t,coeff:t.coeff+ri(1,3)}:t):m));
      } else {
        const m=mod.map(t=>t.power===1?{...t,coeff:t.coeff*2}:t);
        dists.add(polyToStr(m));
      }
      safe++;
    }
    while(dists.size<4){
      const m=q.combined.map((t,i)=>i===0?t:{...t,coeff:t.coeff+dists.size});
      dists.add(polyToStr(m));
    }
    q.options=shuf([...dists]);
    questions.push(q);
  }
  return questions;
}

/* ======================================================================
   MAP
   ====================================================================== */
function renderMap(){
  const list=document.getElementById('mL');list.innerHTML='';
  document.getElementById('allSt').textContent=st.total;
  ZONES.forEach((z,zi)=>{
    const zs=st.zones[zi];const done=zs.levels.filter(v=>v>0).length;
    const zStars=zs.levels.reduce((a,v)=>a+v,0);
    const prevOk=zi===0||st.zones[zi-1].levels.filter(v=>v>0).length>=Math.ceil(ZONES[zi-1].levels*.5);
    const unlocked=prevOk,complete=done===z.levels,current=unlocked&&!complete;
    const card=document.createElement('div');
    card.className=`zc${!unlocked?' lk':''}${complete?' dn':''}${current?' nw':''}`;
    card.innerHTML=`<div class="zi" style="background:${z.bg};color:${z.color}">${z.icon}</div>
      <div class="zb"><div class="zn" style="color:${unlocked?z.color:'#999'}">${z.name}</div><div class="zd">${unlocked?z.desc:'完成前面的区域解锁'}</div>
      <div class="zdots">${zs.levels.map((v,li)=>{const d=v>0;const c=!d&&(li===0||zs.levels[li-1]>0);return`<div class="zdt${d?' on':''}${c?' cu':''}"></div>`}).join('')}</div></div>
      <div class="zr"><div class="zsv">${zStars}/${z.levels*3}</div></div>`;
    if(unlocked) card.onclick=()=>openZ(zi);
    list.appendChild(card);
  });
}
function openZ(zi){cZ=zi;const zs=st.zones[zi];let l=zs.levels.findIndex(v=>v===0);if(l===-1)l=0;startLvl(l)}

/* ======================================================================
   GAME PLAY
   ====================================================================== */
function startLvl(l){
  cL=l;qi=0;correct=0;streak=0;maxSk=0;attempts=0;answered=false;
  const z=ZONES[cZ];qs=genQs(z,l);
  document.getElementById('ghZ').textContent=z.name;
  document.getElementById('ghZ').style.color=z.color;
  document.getElementById('ghL').textContent=`Level ${l+1}`;
  show('scnG');renderQ();
}

function renderQ(){
  answered=false;
  if(areaAnimTimer){clearInterval(areaAnimTimer);areaAnimTimer=null}
  const q=qs[qi];

  const dots=document.getElementById('gDs');dots.innerHTML='';
  for(let i=0;i<QPL;i++){const d=document.createElement('div');d.className=`gd${i<qi?' done':''}${i===qi?' act':''}`;dots.appendChild(d)}

  document.getElementById('eqTxt').textContent=q.expr;
  drawAreaModel(q, 0); // show empty grid with question marks
  renderCollect(q, false);
  document.getElementById('gHint').textContent='';

  const grid=document.getElementById('optsG');grid.innerHTML='';
  const longest=Math.max(...q.options.map(o=>o.length));
  grid.className=longest>16?'opts single-col':'opts';

  q.options.forEach(opt=>{
    const btn=document.createElement('button');btn.className='ob';
    btn.textContent=opt;
    btn.onclick=e=>handleAns(opt,q,btn,e);
    grid.appendChild(btn);
  });
  updStrk();
}

function handleAns(chosen,q,btn,ev){
  if(answered)return;
  attempts++;

  if(chosen===q.answer){
    answered=true;correct++;streak++;
    if(streak>maxSk)maxSk=streak;

    btn.classList.add('ok');
    document.querySelectorAll('.ob').forEach(b=>{if(!b.classList.contains('ok'))b.classList.add('off')});

    // Animated reveal of area cells one by one
    animateAreaReveal(q);

    const totalCells = q.cells.length * q.cells[0].length;
    setTimeout(()=>renderCollect(q,true), totalCells * 350 + 200);

    const r=btn.getBoundingClientRect();
    burst(r.left+r.width/2,r.top+r.height/2,streak>=3?26:14);
    showCk();updStrk();

    document.getElementById('gHint').textContent=OK_W[ri(0,OK_W.length-1)];
    document.getElementById('gHint').style.color='#22C55E';

    setTimeout(()=>{qi++;if(qi>=QPL)finishLvl();else renderQ()}, totalCells * 350 + 1200);

  } else {
    streak=0;updStrk();
    btn.classList.add('nope');

    // Instantly reveal all cells as hint
    revealAllCells(q);

    document.getElementById('gHint').textContent=`💡 ${q.hint}`;
    document.getElementById('gHint').style.color='var(--electric)';
  }
}

/* ======================================================================
   RESULT
   ====================================================================== */
function finishLvl(){
  if(areaAnimTimer){clearInterval(areaAnimTimer);areaAnimTimer=null}
  let stars;if(attempts<=QPL)stars=3;else if(attempts<=QPL+2)stars=2;else stars=1;
  const prev=st.zones[cZ].levels[cL];if(stars>prev){st.zones[cZ].levels[cL]=stars;saveS()}
  const starsEl=document.getElementById('rsSt');starsEl.innerHTML='';
  for(let i=0;i<3;i++){const s=document.createElement('div');s.className=`rs${i<stars?' got':''}`;s.innerHTML=`<svg viewBox="0 0 24 24" fill="${i<stars?'#FBBF24':'#CBD5E1'}"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>`;starsEl.appendChild(s)}
  document.getElementById('rsT').textContent=['做到了！','太棒了！','完美通关！'][Math.min(stars-1,2)];
  document.getElementById('rsMsg').textContent=CHEERS[ri(0,CHEERS.length-1)];
  document.getElementById('rvO').textContent=`${correct}/${QPL}`;
  document.getElementById('rvS').textContent=maxSk;
  const hasNext=cL+1<ZONES[cZ].levels;const btn=document.getElementById('btnN');
  btn.textContent=hasNext?'继续实验':'返回地图';btn.onclick=hasNext?goNxt:toMap;
  show('scnR');setTimeout(()=>burst(window.innerWidth/2,window.innerHeight/3,30),500);
}
function goNxt(){if(cL+1<ZONES[cZ].levels)startLvl(cL+1);else toMap()}
function enterMap(){show('scnM');renderMap()}
function toMap(){if(areaAnimTimer){clearInterval(areaAnimTimer);areaAnimTimer=null}show('scnM');renderMap()}
saveS();
</script>
