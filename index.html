<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,maximum-scale=1">
<title>Numby · 数感练习</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#F8F1F8;--card:#FFFFFF;--card2:#FFF5FB;--card3:#F0E6F6;
  --text:#4A3B5C;--text2:#8B78A0;--text3:#B8A8CA;
  --pink:#F2A0C4;--pink2:#E87BAA;--pinkbg:#FFF0F6;
  --lilac:#C5A8E8;--lilac2:#A07DCC;--lilacbg:#F3EAFF;
  --mint:#8DD8C0;--mint2:#5CB89E;--mintbg:#E8FBF3;
  --sky:#8BBFE8;--sky2:#5A9BD4;--skybg:#E8F4FF;
  --peach:#F2C08A;--peach2:#D9983E;--peachbg:#FFF5E8;
  --coral:#F09E8E;--coral2:#D97560;--coralbg:#FFF0EC;
  --r:14px;--r2:18px;--r3:24px;
  --shadow:0 2px 12px rgba(74,59,92,0.06);
  --font:'Quicksand','Noto Sans SC',sans-serif;
}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:var(--font);color:var(--text);display:flex;justify-content:center}
.app{width:100%;max-width:430px;height:100%;display:flex;flex-direction:column;position:relative;overflow:hidden}
.screen{display:none;flex-direction:column;height:100%;position:absolute;inset:0;z-index:1}
.screen.active{display:flex;animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

.mascot{display:inline-block}.mascot-body{font-size:48px;animation:bobble 2.5s ease-in-out infinite}
@keyframes bobble{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-6px) rotate(2deg)}}
.mascot-sm{font-size:28px}.mascot-sm .mascot-body{animation-duration:2s}

.home-scroll{flex:1;overflow-y:auto;padding:16px 16px 90px;-webkit-overflow-scrolling:touch}
.home-top{text-align:center;padding:max(3vh,12px) 0 16px}
.home-hi{font-size:14px;color:var(--text2);margin-bottom:4px}
.home-title{font-size:26px;font-weight:700;color:var(--text);margin-bottom:2px}
.home-sub{font-size:12px;color:var(--text3);margin-bottom:14px}
.streak-card{background:var(--card);border-radius:var(--r2);padding:14px 18px;box-shadow:var(--shadow);display:flex;align-items:center;gap:14px;margin-bottom:18px}
.streak-icon{font-size:28px}.streak-info{flex:1}
.streak-title{font-size:13px;font-weight:700;margin-bottom:2px}
.streak-bar{height:6px;background:var(--card3);border-radius:3px;overflow:hidden}
.streak-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--pink),var(--lilac));transition:width .6s}
.streak-text{font-size:11px;color:var(--text3);margin-top:3px}
.sec-label{font-size:11px;font-weight:700;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;padding-left:2px}
.scene-list{display:flex;flex-direction:column;gap:10px}
.sc-card{background:var(--card);border-radius:var(--r2);padding:14px 16px;box-shadow:var(--shadow);display:flex;align-items:center;gap:14px;cursor:pointer;transition:all .2s;border:2px solid transparent}
.sc-card:active{transform:scale(.97)}.sc-card.locked{opacity:.4;pointer-events:none}
.sc-emoji{width:46px;height:46px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.sc-info{flex:1;min-width:0}.sc-name{font-size:14px;font-weight:700;margin-bottom:1px}
.sc-desc{font-size:11px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sc-right{text-align:right;flex-shrink:0}.sc-dots{font-size:12px;letter-spacing:3px;margin-bottom:2px}
.sc-tag{font-size:9px;font-weight:700;padding:2px 8px;border-radius:8px;display:inline-block}

.modal-bg{position:fixed;inset:0;background:rgba(74,59,92,.45);z-index:100;display:none;align-items:center;justify-content:center;padding:20px}
.modal-bg.show{display:flex}
.modal{background:var(--card);border-radius:var(--r3);padding:28px 22px 24px;max-width:360px;width:100%;text-align:center;box-shadow:0 12px 40px rgba(74,59,92,.15);animation:popUp .3s ease}
@keyframes popUp{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
.modal h2{font-size:19px;font-weight:700;margin-bottom:6px}
.modal p{font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:14px}
.modal .m-tip{background:var(--card2);border-radius:var(--r);padding:12px;font-size:12px;line-height:1.6;text-align:left;margin-bottom:18px;border-left:3px solid var(--pink)}
.btn-go{width:100%;padding:14px;border:none;border-radius:var(--r);font-size:15px;font-weight:700;font-family:var(--font);color:#fff;cursor:pointer}
.btn-go:active{transform:scale(.97);opacity:.9}

.game-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 6px;flex-shrink:0}
.btn-back{width:38px;height:38px;border-radius:12px;background:var(--card);border:2px solid var(--card3);font-size:17px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2)}
.g-title{font-size:14px;font-weight:700}.g-pts{font-size:13px;font-weight:700;color:var(--pink2)}
.g-prog{margin:6px 16px 0;height:6px;background:var(--card3);border-radius:3px;overflow:hidden;flex-shrink:0}
.g-prog-bar{height:100%;border-radius:3px;transition:width .5s}
.game-body{flex:1;overflow-y:auto;padding:14px 16px;-webkit-overflow-scrolling:touch}

.speech-row{display:flex;align-items:flex-end;gap:10px;margin-bottom:14px}
.speech-bubble{background:var(--card);border-radius:var(--r2);padding:14px 16px;box-shadow:var(--shadow);flex:1;position:relative}
.speech-bubble::before{content:'';position:absolute;bottom:10px;left:-8px;width:0;height:0;border-top:6px solid transparent;border-bottom:6px solid transparent;border-right:8px solid var(--card)}
.q-num{font-size:10px;color:var(--text3);font-weight:700;letter-spacing:1px;margin-bottom:8px}
.q-scene{margin:6px 0 10px}.q-text{font-size:15px;font-weight:600;line-height:1.6}

.thermo-w{display:flex;align-items:center;justify-content:center;gap:16px;padding:6px 0}
.thermo-col{width:28px;height:150px;background:var(--card3);border-radius:14px;position:relative;overflow:hidden;border:2px solid #E8DCF0}
.thermo-fill{position:absolute;bottom:0;left:0;right:0;border-radius:0 0 12px 12px;transition:height .5s,background .5s}
.thermo-scale{display:flex;flex-direction:column;justify-content:space-between;height:150px}
.thermo-v{font-size:10px;color:var(--text3);font-weight:600;text-align:right;width:28px}
.thermo-v.z{color:var(--sky2);font-weight:700}
.thermo-read{text-align:center}.thermo-big{font-size:26px;font-weight:700}
.thermo-lbl{font-size:10px;color:var(--text3);margin-top:2px}

.map-w{width:100%;max-width:280px;margin:0 auto}
.map-road{height:34px;background:var(--card3);border-radius:8px;position:relative;margin:4px 0}
.map-lane{position:absolute;top:50%;left:6px;right:6px;height:2px;border-top:2px dashed #E0D4EC}
.map-dot{position:absolute;top:50%;width:10px;height:10px;border-radius:50%;transform:translate(-50%,-50%)}
.map-dot.st{background:var(--text3)}
.map-zero-m{position:absolute;top:50%;transform:translate(-50%,-50%);width:2px;height:14px;background:var(--text3);opacity:.4}
.map-row{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);font-weight:600}
.map-tag{text-align:center;margin-top:6px}
.map-tag span{font-size:11px;color:var(--sky2);background:var(--skybg);padding:3px 12px;border-radius:8px;font-weight:600}

.wallet-w{text-align:center}.wallet-bal{font-size:30px;font-weight:700;margin:4px 0}
.wallet-bal.neg{color:var(--coral2)}.wallet-bal.pos{color:var(--mint2)}
.wallet-lbl{font-size:10px;color:var(--text3);margin-bottom:8px}
.wallet-txn{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:10px;font-size:13px;font-weight:600}
.wallet-txn.inc{background:var(--mintbg);color:var(--mint2)}.wallet-txn.exp{background:var(--coralbg);color:var(--coral2)}

.elev-w{display:flex;align-items:center;justify-content:center;gap:14px}
.elev-shaft{width:38px;height:150px;background:var(--card3);border-radius:8px;position:relative;border:2px solid #E8DCF0}
.elev-car{position:absolute;left:3px;right:3px;height:22px;background:var(--lilac);border-radius:5px;transition:bottom .5s;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff}
.elev-floors{display:flex;flex-direction:column;justify-content:space-between;height:150px}
.elev-f{font-size:10px;font-weight:600;color:var(--text3)}.elev-f.g{color:var(--mint2)}.elev-f.b{color:var(--coral2)}
.elev-read{text-align:center}.elev-big{font-size:26px;font-weight:700}.elev-lbl{font-size:10px;color:var(--text3);margin-top:2px}

.shop-w{text-align:center}.shop-icon{font-size:42px;margin-bottom:4px}
.shop-price{font-size:15px;font-weight:700;color:var(--peach2);background:var(--peachbg);display:inline-block;padding:4px 14px;border-radius:10px}
.shop-have{margin-top:8px;font-size:12px;color:var(--text2)}.shop-have b{color:var(--text);font-weight:700}

.clock-w{text-align:center}
.clock-face{width:100px;height:100px;border-radius:50%;border:3px solid var(--card3);background:var(--card);margin:0 auto 6px;position:relative}
.clock-center{position:absolute;top:50%;left:50%;width:6px;height:6px;background:var(--text);border-radius:50%;transform:translate(-50%,-50%);z-index:3}
.clock-hand{position:absolute;bottom:50%;left:50%;transform-origin:bottom center;border-radius:2px}
.clock-h{width:3px;height:24px;background:var(--text);z-index:2;transition:transform .5s}
.clock-m{width:2px;height:35px;background:var(--lilac2);z-index:1;transition:transform .5s}
.clock-nums{position:absolute;inset:5px}
.clock-n{position:absolute;transform:translate(-50%,-50%);font-size:9px;color:var(--text3);font-weight:700}
.clock-time{font-size:22px;font-weight:700}.clock-sub{font-size:10px;color:var(--text3)}

.opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.opt{background:var(--card);border:2.5px solid var(--card3);border-radius:var(--r);padding:15px 8px;font-size:18px;font-weight:700;font-family:var(--font);color:var(--text);cursor:pointer;transition:all .15s}
.opt:active{transform:scale(.95)}
.opt.ok{border-color:var(--mint);background:var(--mintbg);animation:pop .35s}
.opt.no{border-color:var(--coral);background:var(--coralbg);animation:shake .35s}
@keyframes pop{50%{transform:scale(1.05)}}
@keyframes shake{25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

.expl{background:var(--card2);border-radius:var(--r);padding:14px;margin-bottom:10px;display:none;animation:fadeIn .25s;font-size:13px;line-height:1.7}
.expl .e-mascot{display:flex;align-items:flex-start;gap:10px}
.expl .e-icon{font-size:24px;flex-shrink:0;margin-top:2px}.expl .e-body{flex:1}
.expl .e-h{font-weight:700;margin-bottom:3px;font-size:13px}
.expl .e-h.ok{color:var(--mint2)}.expl .e-h.no{color:var(--coral2)}
.expl .e-math{color:var(--lilac2);font-weight:700;margin:4px 0;font-size:14px}

.btn-next{width:100%;padding:14px;border:none;border-radius:var(--r);font-size:14px;font-weight:700;font-family:var(--font);color:#fff;cursor:pointer;display:none;transition:all .15s}
.btn-next:active{transform:scale(.97)}

.result{text-align:center;padding:max(4vh,20px) 20px 30px;overflow-y:auto;flex:1}
.r-mascot{margin-bottom:8px}.r-title{font-size:22px;font-weight:700;margin-bottom:4px}
.r-sub{font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.6}
.r-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:24px}
.r-stat{background:var(--card);border-radius:var(--r);padding:14px 6px;box-shadow:var(--shadow)}
.r-stat-v{font-size:22px;font-weight:700}.r-stat-l{font-size:10px;color:var(--text3);margin-top:2px}
.btn-main{width:100%;padding:14px;border:none;border-radius:var(--r);font-size:15px;font-weight:700;font-family:var(--font);color:#fff;cursor:pointer;margin-bottom:8px}
.btn-main:active{transform:scale(.97)}
.btn-alt{width:100%;padding:12px;border:2px solid var(--card3);border-radius:var(--r);background:transparent;font-size:13px;font-weight:600;font-family:var(--font);color:var(--text2);cursor:pointer}

.toast{position:fixed;top:50px;left:50%;transform:translateX(-50%) scale(.9);padding:6px 18px;border-radius:12px;font-size:12px;font-weight:700;z-index:200;opacity:0;transition:all .3s;pointer-events:none;background:var(--pink);color:#fff}
.toast.show{opacity:1;transform:translateX(-50%) scale(1)}
.float-fb{position:fixed;font-size:28px;pointer-events:none;z-index:200;animation:fu .9s ease forwards}
@keyframes fu{from{opacity:1;transform:translateY(0) scale(1)}to{opacity:0;transform:translateY(-90px) scale(1.4)}}

/* ===== SHARE CARD ===== */
.share-scroll{flex:1;overflow-y:auto;padding:20px 16px;-webkit-overflow-scrolling:touch;display:flex;flex-direction:column;align-items:center}
.share-card{
  width:100%;max-width:360px;background:var(--card);border-radius:var(--r3);
  padding:32px 24px 28px;box-shadow:0 8px 40px rgba(74,59,92,.1);
  text-align:center;position:relative;overflow:hidden;
}
.share-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:6px;
  background:linear-gradient(90deg,var(--pink),var(--lilac),var(--mint),var(--sky),var(--peach),var(--coral));
}
.share-logo{font-size:36px;margin-bottom:4px}
.share-title{font-size:20px;font-weight:700;margin-bottom:2px}
.share-date{font-size:11px;color:var(--text3);margin-bottom:18px}
.share-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:16px}
.share-sc{background:var(--card2);border-radius:10px;padding:10px 4px;text-align:center}
.share-sc-emoji{font-size:18px;margin-bottom:2px}
.share-sc-name{font-size:9px;color:var(--text2);font-weight:600;margin-bottom:3px}
.share-sc-stars{font-size:10px;letter-spacing:1px}
.share-big{display:flex;justify-content:center;gap:20px;margin-bottom:16px}
.share-stat{text-align:center}
.share-stat-v{font-size:28px;font-weight:700}
.share-stat-l{font-size:10px;color:var(--text3)}
.share-msg{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:4px}
.share-brand{font-size:10px;color:var(--text3);margin-top:12px}
.share-hint{font-size:12px;color:var(--text3);margin-top:16px;padding:10px;background:var(--card2);border-radius:10px;line-height:1.5}
.share-btns{margin-top:14px;display:flex;flex-direction:column;gap:8px;width:100%;max-width:360px}
</style>
</head>
<body>
<div class="app">

<div class="screen active" id="scrHome">
  <div class="home-scroll">
    <div class="home-top">
      <div class="mascot"><span class="mascot-body">☁️</span></div>
      <div class="home-hi">hi~ 欢迎回来</div>
      <div class="home-title">Numby</div>
      <div class="home-sub">每天练一练，慢慢变厉害 ✨</div>
    </div>
    <div class="streak-card">
      <div class="streak-icon">🌱</div>
      <div class="streak-info">
        <div class="streak-title">成长进度</div>
        <div class="streak-bar"><div class="streak-fill" id="xpBar"></div></div>
        <div class="streak-text" id="xpText">继续加油～</div>
      </div>
    </div>
    <div class="sec-label">选择场景</div>
    <div class="scene-list" id="scList"></div>
  </div>
</div>

<div class="screen" id="scrGame">
  <div class="game-head">
    <button class="btn-back" onclick="goHome()">←</button>
    <span class="g-title" id="gTitle"></span>
    <span class="g-pts" id="gPts">✿ 0</span>
  </div>
  <div class="g-prog"><div class="g-prog-bar" id="gProg"></div></div>
  <div class="game-body">
    <div class="speech-row">
      <div class="mascot mascot-sm"><span class="mascot-body">☁️</span></div>
      <div class="speech-bubble">
        <div class="q-num" id="qNum"></div>
        <div class="q-scene" id="qScene"></div>
        <div class="q-text" id="qText"></div>
      </div>
    </div>
    <div class="opts" id="opts"></div>
    <div class="expl" id="expl"></div>
    <button class="btn-next" id="btnNext" onclick="nextQ()">下一题 ♪</button>
  </div>
</div>

<div class="screen" id="scrResult"><div class="result" id="resBody"></div></div>
<div class="screen" id="scrShare"><div class="share-scroll" id="shareBody"></div></div>

</div>
<div class="modal-bg" id="modalBg"><div class="modal" id="modal"></div></div>
<div class="toast" id="toast"></div>

<script>
const TOTAL=5;
let S={sc:0,qi:0,pts:0,combo:0,mcombo:0,cor:0,qs:[],done:false,prog:lp()};
function lp(){try{if(typeof localStorage!=='undefined'){const d=localStorage.getItem('nb_p2');if(d)return JSON.parse(d)}}catch(e){}return{stars:{},unlocked:[0,1],totalCorrect:0,totalPlayed:0}}
function sp(){try{if(typeof localStorage!=='undefined')localStorage.setItem('nb_p2',JSON.stringify(S.prog))}catch(e){}}
function R(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function Rf(arr){return arr[R(0,arr.length-1)]}
function sh(a){for(let i=a.length-1;i>0;i--){const j=R(0,i);[a[i],a[j]]=[a[j],a[i]]}return a}
function mo(ans,gw){const s=new Set([String(ans)]);let t=0;while(s.size<4&&t<60){const v=String(gw());if(v!==String(ans))s.add(v);t++}while(s.size<4){const n=Number(String(ans).replace(/[^-\d]/g,''));const u=String(ans).replace(/[-\d]/g,'');s.add(String(n+s.size)+u)}return sh([...s])}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v))}

const cheers=['做得好！','厉害～','没问题的！','就是这样！','完全正确！'];
const encourages=['没关系，看看为什么～','差一点点！我们来想想～','不要急，慢慢来～','这题有点难，一起看看～','下次一定可以！'];

const SC=[
{id:0,name:'温度变化',desc:'感受冷与热',emoji:'🌡️',bg:'var(--coralbg)',accent:'var(--coral2)',barC:'var(--coral)',
 tut:{t:'温度变化',d:'温度计就像一条竖着的尺子。往上走变热是加法，往下走变冷是减法。到了零度以下就是负数——就像冬天的北方！',tip:'升温 = 往上走 = 加法\n降温 = 往下走 = 减法\n零度以下 = 负数'},gen:genTemp},
{id:1,name:'地图导航',desc:'东和西的方向',emoji:'🗺️',bg:'var(--skybg)',accent:'var(--sky2)',barC:'var(--sky)',
 tut:{t:'地图导航',d:'想象一条东西方向的路，你站在起点 0。向东走 = 往正数方向 = 加法，向西走 = 往负数方向 = 减法。',tip:'东 = 正方向 = 加\n西 = 负方向 = 减\n在起点西边 = 位置是负数'},gen:genMap},
{id:2,name:'收入支出',desc:'钱包里的加减',emoji:'💰',bg:'var(--mintbg)',accent:'var(--mint2)',barC:'var(--mint)',
 tut:{t:'收入支出',d:'赚钱就是加法，花钱就是减法。你的余额就像一个数——花得比赚得多，余额就变成负数，意思是"你欠钱了"。',tip:'收入 = 加法（余额增加）\n支出 = 减法（余额减少）\n余额为负 = 你欠了钱'},gen:genMoney},
{id:3,name:'电梯楼层',desc:'上上下下',emoji:'🛗',bg:'var(--lilacbg)',accent:'var(--lilac2)',barC:'var(--lilac)',
 tut:{t:'电梯楼层',d:'电梯就是一个会上下移动的小指针！地面 = 0层，上楼 = 加法，下楼 = 减法。地下停车场就是负数楼层。',tip:'上楼 = 加法\n下楼 = 减法\n地下层 = 负数'},gen:genElev},
{id:4,name:'购物找零',desc:'买买买的数学',emoji:'🛒',bg:'var(--peachbg)',accent:'var(--peach2)',barC:'var(--peach)',

/* ===== RANDOMIZED GENERATORS ===== */
function genTemp(){
  const tiers=[
    ()=>{const s=R(5,18);const d=-R(2,s);return{s,d}},
    ()=>{const s=R(1,5);const d=-R(s+1,s+6);return{s,d}},
    ()=>{const s=-R(1,6);const d=R(2,10);return{s,d}},
    ()=>{const s=-R(1,5);const d=-R(1,5);return{s,d}},
    ()=>{const s=R(-3,3);const d=R(-8,8);while(Math.abs(d)<1)return{s,d:R(1,3)*(Math.random()>.5?1:-1)};return{s,d}},
  ];
  return tiers.map((fn,i)=>{
    const{s,d}=fn();const ans=s+d;
    const op=d>0?`${s} + ${d}`:`${s} - ${-d}`;
    return{num:`${i+1} / ${TOTAL}`,
      text:`现在 ${s}°C，${d>0?'升温':'降温'} ${Math.abs(d)}°C 后是几度？`,
      scene:rThermo(s,ans),answer:`${ans}°C`,
      options:mo(`${ans}°C`,()=>`${ans+R(-5,5)||ans+1}°C`),
      explain:`${op} = ${ans}°C${ans<0?'\n零度以下了，负数表示很冷！':ans===0?'\n刚好到冰点！':''}`};
  });
}

function genMap(){
  const tiers=[
    ()=>({s:0,d:R(2,7)}),
    ()=>({s:0,d:-R(2,6)}),
    ()=>({s:R(1,5),d:-R(s=>s+1,()=>R(4,9))(0)}),
    ()=>({s:-R(1,5),d:R(2,8)}),
    ()=>({s:R(-5,5),d:(Math.random()>.5?1:-1)*R(2,7)}),
  ];
  const qs=[];
  for(let i=0;i<TOTAL;i++){
    let s,d;
    if(i===0){s=0;d=R(2,7)}
    else if(i===1){s=0;d=-R(2,6)}
    else if(i===2){s=R(1,5);d=-R(s+1,s+5)}
    else if(i===3){s=-R(1,5);d=R(2,8)}
    else{s=R(-5,5);d=(Math.random()>.5?1:-1)*R(2,7)}
    const ans=s+d;
    qs.push({num:`${i+1} / ${TOTAL}`,
      text:`你在 ${s}km，向${d>0?'东':'西'}走 ${Math.abs(d)}km，到了哪里？`,
      scene:rMap(s,ans,d),answer:`${ans}km`,
      options:mo(`${ans}km`,()=>`${ans+R(-4,4)||ans+1}km`),
      explain:`${s} + (${d}) = ${ans}km${ans<0?'\n负数 = 在起点的西边':ans===0?'\n回到起点啦！':''}`});
  }
  return qs;
}

function genMoney(){
  const items=[
    {i:'🧋',n:'奶茶'},{i:'🍕',n:'外卖'},{i:'📚',n:'教材'},{i:'🎧',n:'耳机'},
    {i:'🧧',n:'红包'},{i:'💴',n:'零花钱'},{i:'🎮',n:'游戏'},{i:'👟',n:'球鞋'},
    {i:'🍦',n:'冰淇淋'},{i:'🎂',n:'蛋糕'},{i:'✏️',n:'文具'},{i:'🧸',n:'手办'}
  ];
  const pool=sh([...items]).slice(0,TOTAL);
  return pool.map((it,i)=>{
    let b,t;
    if(i===0){b=R(30,80);t=-R(5,b-5)}
    else if(i===1){b=R(10,50);t=R(5,30)}
    else if(i===2){b=R(10,25);t=-R(b+5,b+20)}
    else if(i===3){b=-R(5,15);t=R(10,30)}
    else{b=R(-10,50);t=(Math.random()>.4?-1:1)*R(5,25)}
    const ans=b+t;
    return{num:`${i+1} / ${TOTAL}`,
      text:`余额 ${b} 元，${t>0?'收到':'花了'} ${Math.abs(t)} 元${t>0?'（'+it.i+it.n+'）':'买'+it.n+' '+it.i}，现在余额是？`,
      scene:rWallet(b,t,it.i,it.n),answer:`${ans}元`,
      options:mo(`${ans}元`,()=>`${ans+R(-6,6)||ans+1}元`),
      explain:`${b} ${t>0?'+ '+t:'- '+(-t)} = ${ans}${ans<0?'\n负数余额 = 欠了 '+(-ans)+' 元':ans===0?'\n花光光了！':''}`};
  });
}

function genElev(){
  const qs=[];
  for(let i=0;i<TOTAL;i++){
    let s,d;
    if(i===0){s=R(1,3);d=R(1,4)}
    else if(i===1){s=R(2,5);d=-R(s+1,s+3)}
    else if(i===2){s=0;d=-R(1,3)}
    else if(i===3){s=-R(1,3);d=R(2,5)}
    else{s=R(-3,4);d=(Math.random()>.5?1:-1)*R(2,5)}
    const ans=s+d;
    qs.push({num:`${i+1} / ${TOTAL}`,
      text:`从 ${s} 层出发，${d>0?'上':'下'} ${Math.abs(d)} 层，到几楼？`,
      scene:rElev(s,ans),answer:`${ans}层`,
      options:mo(`${ans}层`,()=>`${ans+R(-3,3)||ans+1}层`),
      explain:`${s} ${d>0?'+ '+d:'- '+(-d)} = ${ans}${ans<0?'\n负数 = 地下 '+(-ans)+' 层':ans===0?'\n回到地面了':''}`});
  }
  return qs;
}

function genShop(){
  const items=[
    {i:'🧋',n:'奶茶'},{i:'🍕',n:'披萨'},{i:'📖',n:'杂志'},{i:'🎧',n:'耳机'},
    {i:'🍦',n:'冰淇淋'},{i:'🧸',n:'手办'},{i:'✏️',n:'文具'},{i:'🎂',n:'蛋糕'},
    {i:'👟',n:'球鞋'},{i:'🎮',n:'游戏卡'},{i:'🧴',n:'护手霜'},{i:'🎀',n:'发饰'}
  ];
  const pool=sh([...items]).slice(0,TOTAL);
  return pool.map((it,i)=>{
    let w,p;
    if(i<2){w=R(30,100);p=R(5,w-5)}
    else if(i===2){p=R(20,60);w=p}
    else{w=R(15,40);p=R(w+5,w+30)}
    const c=w-p;
    return{num:`${i+1} / ${TOTAL}`,
      text:`你有 ${w} 元，买 ${p} 元的${it.n} ${it.i}，还剩多少？`,
      scene:rShop(it.i,p,w),answer:`${c}元`,
      options:mo(`${c}元`,()=>`${c+R(-6,6)||c+1}元`),
      explain:`${w} - ${p} = ${c}${c<0?'\n钱不够！欠了 '+(-c)+' 元':c===0?'\n刚好花完～':'\n找零 '+c+' 元'}`};
  });
}

function genTime(){
  const qs=[];
  for(let i=0;i<TOTAL;i++){
    let h,d;
    if(i===0){h=R(8,14);d=R(1,5)}
    else if(i===1){h=R(10,18);d=-R(1,5)}
    else if(i===2){h=R(6,12);d=R(3,8)}
    else if(i===3){h=R(20,23);d=R(2,5)}
    else{h=R(0,4);d=-R(1,5)}
    let ans=(h+d)%24;if(ans<0)ans+=24;
    qs.push({num:`${i+1} / ${TOTAL}`,
      text:`现在 ${h}:00，${d>0?d+'小时后':(-d)+'小时前'}是几点？`,
      scene:rClock(h,ans),answer:`${ans}时`,
      options:mo(`${ans}时`,()=>{let w=(ans+R(-4,4))%24;if(w<0)w+=24;return`${w}时`}),
      explain:`${h} ${d>0?'+ '+d:'- '+(-d)} = ${h+d}${h+d>=24?' → 超过24，减去24 = '+ans+'时':h+d<0?' → 小于0，加上24 = '+ans+'时':' = '+ans+'时'}`});
  }
  return qs;
}

/* ===== RENDERERS ===== */
function rThermo(s,e){
  const mn=-10,mx=20,rng=mx-mn;
  const ePct=Math.max(0,Math.min(100,((e-mn)/rng)*100));
  const col=e<0?'var(--sky2)':e<10?'var(--peach2)':'var(--coral2)';
  return`<div class="thermo-w"><div class="thermo-scale">${[20,10,0,-10].map(v=>`<div class="thermo-v${v===0?' z':''}">${v}°</div>`).join('')}</div><div class="thermo-col"><div class="thermo-fill" style="height:${ePct}%;background:${col}"></div></div><div class="thermo-read"><div class="thermo-big" style="color:${col}">${s}°C</div><div class="thermo-lbl">现在</div><div style="font-size:16px;color:var(--text3);margin:2px 0">↓</div><div class="thermo-big" style="color:var(--text3)">?°C</div><div class="thermo-lbl">之后</div></div></div>`;
}
function rMap(s,e,d){
  const mn=-8,mx=8,rng=mx-mn;const sp=((clamp(s,mn,mx)-mn)/rng)*100;const zp=((0-mn)/rng)*100;
  return`<div class="map-w"><div class="map-row"><span>← 西</span><span>0</span><span>东 →</span></div><div class="map-road"><div class="map-lane"></div><div class="map-zero-m" style="left:${zp}%"></div><div class="map-dot st" style="left:${sp}%"></div></div><div class="map-tag"><span>${s}km → ${d>0?'东':'西'} ${Math.abs(d)}km → ?</span></div></div>`;
}
function rWallet(b,t,ic,nm){
  const ie=t<0;
  return`<div class="wallet-w"><div class="wallet-lbl">余额</div><div class="wallet-bal ${b<0?'neg':'pos'}">${b}元</div><div class="wallet-txn ${ie?'exp':'inc'}">${ic} ${nm} ${ie?'':'+'}${t>0?'+':''}${t}元</div></div>`;
}
function rElev(s,e){
  const fs=[5,4,3,2,1,0,-1,-2,-3,-4],mn=-4,mx=5,rng=mx-mn;const cp=((clamp(s,mn,mx)-mn)/rng)*100;
  return`<div class="elev-w"><div class="elev-shaft"><div class="elev-car" style="bottom:${cp}%">${s}</div></div><div class="elev-floors">${fs.map(f=>`<div class="elev-f${f===0?' g':f<0?' b':''}">${f===0?'G':f>0?f+'F':'B'+(-f)}</div>`).join('')}</div><div class="elev-read"><div class="elev-big">${s}层</div><div class="elev-lbl">→ ?层</div></div></div>`;
}
function rShop(ic,pr,wl){
  return`<div class="shop-w"><div class="shop-icon">${ic}</div><div class="shop-price">¥${pr}</div><div class="shop-have">钱包：<b>¥${wl}</b></div></div>`;
}
function rClock(h,e){
  const hd=(h%12)*30;
  const nums=[{n:12,x:50,y:8},{n:3,x:92,y:50},{n:6,x:50,y:92},{n:9,x:8,y:50}];
  return`<div class="clock-w"><div class="clock-face"><div class="clock-center"></div><div class="clock-hand clock-h" style="transform:translateX(-50%) rotate(${hd}deg)"></div><div class="clock-hand clock-m" style="transform:translateX(-50%) rotate(0deg)"></div><div class="clock-nums">${nums.map(p=>`<span class="clock-n" style="left:${p.x}%;top:${p.y}%">${p.n}</span>`).join('')}</div></div><div class="clock-time">${String(h).padStart(2,'0')}:00</div><div class="clock-sub">24小时制</div></div>`;
}

function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}

function startSc(i){
  if(!S.prog.unlocked.includes(i))return;
  S.sc=i;S.qi=0;S.pts=0;S.combo=0;S.mcombo=0;S.cor=0;S.done=false;
  const sc=SC[i];S.qs=sc.gen();
  const m=document.getElementById('modal');
  m.innerHTML=`<div style="margin-bottom:8px"><div class="mascot"><span class="mascot-body">☁️</span></div></div>
    <h2>${sc.tut.t}</h2><p>${sc.tut.d}</p>
    <div class="m-tip">${sc.tut.tip.replace(/\n/g,'<br>')}</div>
    <button class="btn-go" style="background:${sc.accent}" onclick="closeTut()">准备好了！</button>`;
  document.getElementById('modalBg').classList.add('show');
}

function closeTut(){
  document.getElementById('modalBg').classList.remove('show');show('scrGame');
  const sc=SC[S.sc];
  document.getElementById('gTitle').textContent=sc.name;
  document.getElementById('gProg').style.background=sc.barC;
  document.getElementById('btnNext').style.background=sc.accent;
  renderQ();
}

function renderQ(){
  const q=S.qs[S.qi];S.done=false;
  document.getElementById('qNum').textContent=q.num;
  document.getElementById('qScene').innerHTML=q.scene;
  document.getElementById('qText').textContent=q.text;
  document.getElementById('gPts').textContent='✿ '+S.pts;
  document.getElementById('gProg').style.width=((S.qi/S.qs.length)*100)+'%';
  document.getElementById('expl').style.display='none';
  document.getElementById('btnNext').style.display='none';
  document.getElementById('opts').innerHTML=q.options.map(o=>
    `<button class="opt" onclick="pick(this,'${o.replace(/'/g,"\\'")}')">${o}</button>`).join('');
}

function pick(btn,val){
  if(S.done)return;S.done=true;
  const q=S.qs[S.qi];const ok=val===q.answer;
  document.querySelectorAll('.opt').forEach(b=>{if(b.textContent===q.answer)b.classList.add('ok');b.style.pointerEvents='none'});
  if(ok){
    S.combo++;S.mcombo=Math.max(S.mcombo,S.combo);S.cor++;
    const bn=S.combo>=3?S.combo:0;S.pts+=5+bn;
    document.getElementById('gPts').textContent='✿ '+S.pts;
    spawnFB(btn,Rf(['✨','💫','🌟','✿','♪']));
    if(S.combo>=3)toast('连对 '+S.combo+' 题！✿');
  }else{btn.classList.add('no');S.combo=0}
  const cheer=ok?Rf(cheers):Rf(encourages);
  const ex=document.getElementById('expl');
  const lines=q.explain.split('\n');
  ex.innerHTML=`<div class="e-mascot"><div class="e-icon">☁️</div><div class="e-body"><div class="e-h ${ok?'ok':'no'}">${cheer}</div><div class="e-math">${lines[0]}</div>${lines.length>1?`<div style="color:var(--text2);font-size:12px;margin-top:4px">${lines.slice(1).join('<br>')}</div>`:''}</div></div>`;
  ex.style.display='block';
  document.getElementById('btnNext').style.display='block';
  setTimeout(()=>ex.scrollIntoView({behavior:'smooth',block:'nearest'}),80);
}

function spawnFB(el,emoji){
  const d=document.createElement('div');d.className='float-fb';d.textContent=emoji;
  const r=el.getBoundingClientRect();d.style.left=r.left+r.width/2-14+'px';d.style.top=r.top-10+'px';
  document.body.appendChild(d);setTimeout(()=>d.remove(),900);
}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1600)}

      </div>
      <div class="share-big">
        <div class="share-stat"><div class="share-stat-v" style="color:var(--pink2)">${ts}/${mx}</div><div class="share-stat-l">总星星</div></div>
        <div class="share-stat"><div class="share-stat-v" style="color:var(--lilac2)">${totalAcc}%</div><div class="share-stat-l">总正确率</div></div>
        <div class="share-stat"><div class="share-stat-v" style="color:var(--mint2)">${S.prog.totalPlayed||0}</div><div class="share-stat-l">总题数</div></div>
      </div>
      <div class="share-msg">${Rf(msgs)}</div>
      <div class="share-brand">Numby · 数感练习 · ${dateStr}</div>
    </div>
    <div class="share-hint">📱 长按截图保存，分享给老师或朋友看看你的成绩吧～</div>
    <div class="share-btns">
      <button class="btn-main" style="background:linear-gradient(135deg,var(--pink),var(--lilac))" onclick="goHome()">回到主页</button>
      <button class="btn-alt" onclick="resetAll()">全部重置（重新挑战）</button>
    </div>`;
  show('scrShare');
}

function resetAll(){
  if(!confirm('确定要重置所有进度吗？星星和记录会全部清零。'))return;
  S.prog={stars:{},unlocked:[0,1],totalCorrect:0,totalPlayed:0};
  sp();goHome();
}

function goHome(){renderHome()}
renderHome();
</script>
</body>
</html>
