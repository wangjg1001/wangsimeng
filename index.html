<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 移动端视口设置，确保在手机上比例正确，且禁止用户随意缩放破坏布局 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>专属数学王国</title>
    <style>
        /* CSS 变量，方便统一管理主题色 */
        :root {
            --bg-color: #F3F4F6;
            --text-main: #1F2937;
            --text-sub: #6B7280;
            --primary-color: #6366F1; /* 主题紫蓝 */
            --card-bg: #FFFFFF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            /* 禁用移动端点击高亮 */
            -webkit-tap-highlight-color: transparent; 
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 24px 20px;
            min-height: 100vh;
        }

        /* 顶部欢迎区 */
        .header {
            margin-bottom: 32px;
            padding-top: 20px;
            animation: fadeInDown 0.6s ease-out;
        }

        .greeting {
            font-size: 16px;
            color: var(--text-sub);
            margin-bottom: 8px;
            display: block;
        }

        .kingdom-title {
            font-size: 28px;
            font-weight: 800;
            line-height: 1.3;
            background: linear-gradient(135deg, #6366F1, #8B5CF6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* 科目卡片容器 */
        .subject-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 独立的卡片设计 */
        .subject-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 24px;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.6s ease-out backwards;
        }

        /* 卡片入场动画延迟，制造层次感 */
        .subject-card:nth-child(1) { animation-delay: 0.1s; }
        .subject-card:nth-child(2) { animation-delay: 0.2s; }

        /* 移动端按下时的触觉反馈 */
        .subject-card:active {
            transform: scale(0.96);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.04);
        }

        /* 卡片左侧内容 */
        .card-content {
            display: flex;
            flex-direction: column;
            gap: 6px;
            z-index: 2;
        }

        .card-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-main);
        }

        .card-subtitle {
            font-size: 14px;
            color: #EF4444; /* 红色醒目提示 */
            background-color: #FEE2E2;
            padding: 4px 10px;
            border-radius: 20px;
            display: inline-block;
            font-weight: 600;
            width: fit-content;
        }

        /* 卡片右侧图标/装饰 */
        .card-icon {
            font-size: 40px;
            z-index: 2;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }

        /* 卡片背景装饰图形 */
        .card-bg-shape {
            position: absolute;
            right: -20px;
            top: -20px;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(139, 92, 246, 0.05));
            z-index: 1;
        }

        /* 底部激励标语 */
        .footer-quote {
            text-align: center;
            margin-top: 40px;
            font-size: 13px;
            color: #9CA3AF;
            letter-spacing: 1px;
            animation: fadeIn 1s ease-out 0.5s backwards;
        }

        /* 简单的 CSS 动画 */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <!-- 顶部欢迎区 -->
    <header class="header">
        <span class="greeting">欢迎回来，</span>
        <!-- 这里的名字将由下方的 JS 动态注入 -->
        <h1 class="kingdom-title">👑 <span id="student-name">同学</span> 的数学王国</h1>
    </header>

    <!-- 核心科目列表 -->
    <main class="subject-list">
        
        <!-- Pure 1 卡片：点击跳转到 weak-pure1.html (你需要自己创建这个目标网页) -->
        <a href="Pure1.html" class="subject-card">
            <div class="card-bg-shape"></div>
            <div class="card-content">
                <div class="card-title">Pure 1</div>
                <!-- 强调这是针对他弱项的独家定制 -->
                <div class="card-subtitle">🎯 独家弱项提分包</div>
            </div>
            <div class="card-icon">📐</div>
        </a>

        <!-- Pure 2 卡片 -->
        <a href="Pure2.html" class="subject-card">
            <div class="card-bg-shape"></div>
            <div class="card-content">
                <div class="card-title">Pure 2</div>
                <div class="card-subtitle">💡 易错题冲刺训练</div>
            </div>
            <div class="card-icon">📈</div>
        
        </a>
        
        <!-- <!-- Pure 2 卡片 
        <a href="weak-pure2.html" class="subject-card">
            <div class="card-bg-shape"></div>
            <div class="card-content">
                <div class="card-title">Pure 2</div>
                <div class="card-subtitle">💡 易错题冲刺训练</div>
            </div>
            <div class="card-icon">📈</div>
        </a> -->

    </main>

    <!-- 底部激励 -->
    <footer class="footer-quote">
        <p>“攻克一个弱项，就向满分迈进了一步。”</p>
    </footer>

    <!-- 交互脚本 -->
    <script>
        // 模拟从数据库或登录状态获取学生名字
        // 实际开发中，可能通过 API 请求获取：fetch('/api/user').then(...)
        const currentUser = {
            name: "王思蒙",
            level: "A-Level"
        };

        // 页面加载完成后，动态替换名字
        document.addEventListener("DOMContentLoaded", () => {
            const nameElement = document.getElementById("student-name");
            if (nameElement && currentUser.name) {
                nameElement.textContent = currentUser.name;
            }
        });
    </script>

</body>
</html>
