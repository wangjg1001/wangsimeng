<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>因式工坊 · Factorise</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --ember:#E8553D;--ember-dk:#C43A24;--ember-lt:#FEF0ED;
  --teal:#0EA5A0;--teal-dk:#0C8480;--teal-lt:#E6FAF9;
  --violet:#7C3AED;--violet-lt:#EDE9FE;
  --sky:#3B82F6;--sky-lt:#EFF6FF;
  --amber:#D97706;--amber-lt:#FEF3C7;
  --rose:#E11D48;--rose-lt:#FFF1F3;
  --slate:#1E293B;--slate-m:#64748B;
  --bg:#FAF9F7;--white:#FFF;
  --gold:#FBBF24;--green:#16A34A;--green-lt:#DCFCE7;
  --shadow-s:0 2px 12px rgba(30,41,59,.06);
  --shadow-m:0 6px 24px rgba(30,41,59,.10);
  --r:14px;--r-lg:20px;
}
body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--slate);overflow-x:hidden;min-height:100vh;-webkit-tap-highlight-color:transparent}
.screen{display:none;min-height:100vh;flex-direction:column}.screen.active{display:flex}

/* WELCOME */
.welcome{align-items:center;justify-content:center;background:linear-gradient(155deg,#FEF0ED 0%,#FDDDD6 30%,#F9C4B8 60%,#F0A898 100%);position:relative;overflow:hidden;padding:40px 24px}
.w-gear{position:absolute;border:3px solid rgba(232,85,61,.08);border-radius:50%;animation:spin 30s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.w-box{position:relative;z-index:2;text-align:center;max-width:500px}
.w-badge{display:inline-block;padding:6px 16px;border-radius:100px;background:rgba(232,85,61,.1);border:1px solid rgba(232,85,61,.2);font-size:11px;font-weight:700;color:var(--ember-dk);letter-spacing:1.5px;margin-bottom:20px}
.w-title{font-size:clamp(36px,9vw,60px);font-weight:700;line-height:1.08;color:var(--slate);margin-bottom:8px}
.w-title em{font-style:normal;color:var(--ember)}
.w-eq{display:inline-block;margin:12px 0 20px;font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:600;color:var(--ember);background:var(--white);padding:10px 24px;border-radius:10px;box-shadow:var(--shadow-s)}
.w-sub{font-size:16px;color:var(--slate-m);font-weight:500;line-height:1.7;margin-bottom:36px}
.w-sub small{display:block;font-size:13px;margin-top:6px;opacity:.6}
.btn-go{display:inline-flex;align-items:center;gap:10px;background:var(--ember);color:#fff;border:none;padding:16px 42px;border-radius:100px;font-size:18px;font-weight:700;font-family:inherit;cursor:pointer;box-shadow:0 8px 28px rgba(232,85,61,.3);transition:all .3s cubic-bezier(.34,1.56,.64,1)}
.btn-go:hover{transform:translateY(-3px);box-shadow:0 14px 36px rgba(232,85,61,.4)}.btn-go:active{transform:scale(.97)}

/* MAP */
.map-s{background:linear-gradient(180deg,var(--ember-lt) 0%,var(--bg) 100%);padding:0}
.m-top{padding:18px 22px;display:flex;align-items:center;justify-content:space-between}
.m-h{font-size:20px;font-weight:700}.m-st{display:flex;align-items:center;gap:5px;background:var(--amber-lt);padding:7px 14px;border-radius:100px;font-weight:700;color:var(--amber);font-size:14px}
.m-list{flex:1;padding:6px 18px 36px;overflow-y:auto;display:flex;flex-direction:column;gap:12px}
.zc{background:var(--white);border-radius:var(--r-lg);padding:20px;box-shadow:var(--shadow-s);cursor:pointer;display:flex;align-items:center;gap:14px;border:2px solid transparent;transition:all .3s cubic-bezier(.34,1.56,.64,1)}
.zc:hover{transform:translateY(-2px);box-shadow:var(--shadow-m)}.zc:active{transform:scale(.98)}
.zc.lk{opacity:.4;pointer-events:none;filter:grayscale(.3)}.zc.dn{border-color:var(--green)}.zc.nw{border-color:var(--ember);animation:zcP 2s ease-in-out infinite}
@keyframes zcP{0%,100%{box-shadow:var(--shadow-s),0 0 0 0 rgba(232,85,61,.1)}50%{box-shadow:var(--shadow-s),0 0 0 8px rgba(232,85,61,.04)}}
.zi{width:50px;height:50px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;font-weight:700;font-family:'JetBrains Mono',monospace;line-height:1.2;text-align:center}
.zb{flex:1}.zn{font-size:15px;font-weight:700;margin-bottom:2px}.zd{font-size:11px;color:var(--slate-m);font-weight:500}
.zdots{display:flex;gap:4px;margin-top:6px}.zdt{width:8px;height:8px;border-radius:50%;background:#E2E8F0;transition:.3s}.zdt.on{background:var(--gold)}.zdt.cu{background:var(--ember);animation:dp 1.4s ease-in-out infinite}
@keyframes dp{0%,100%{transform:scale(1)}50%{transform:scale(1.4)}}
.zr{text-align:right;flex-shrink:0}.zsv{font-size:12px;font-weight:700;color:var(--amber)}

/* GAME */
.game-s{background:var(--bg);padding:0}
.gh{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;background:var(--white);box-shadow:0 1px 8px rgba(0,0,0,.03)}
.gh-b{background:none;border:none;font-size:14px;font-weight:600;color:var(--slate-m);cursor:pointer;font-family:inherit;padding:8px}
.gh-z{font-size:12px;font-weight:700;color:var(--ember)}
.gh-l{font-size:12px;font-weight:600;color:var(--slate-m)}
.gbd{flex:1;display:flex;flex-direction:column;align-items:center;padding:14px 14px 24px;overflow-y:auto}
.gds{display:flex;gap:8px;margin-bottom:14px}
.gd{width:10px;height:10px;border-radius:50%;background:#E2E8F0;transition:.4s cubic-bezier(.34,1.56,.64,1)}.gd.done{background:var(--green);transform:scale(1.1)}.gd.act{background:var(--ember);transform:scale(1.3);box-shadow:0 0 0 4px rgba(232,85,61,.15)}

/* equation card */
.eq-card{background:var(--white);border-radius:var(--r);padding:14px 20px;box-shadow:var(--shadow-s);text-align:center;max-width:440px;width:100%;margin-bottom:10px;position:relative;overflow:hidden}
.eq-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--ember),var(--amber),var(--ember))}
.eq-lbl{font-size:10px;font-weight:700;color:var(--ember);letter-spacing:1px;margin-bottom:4px}
.eq-text{font-family:'JetBrains Mono',monospace;font-size:clamp(20px,5vw,30px);font-weight:700;color:var(--slate);letter-spacing:1px}

/* canvas area */
.area-wrap{width:100%;max-width:440px;background:var(--white);border-radius:var(--r-lg);box-shadow:var(--shadow-m);padding:16px;margin-bottom:12px;overflow:hidden}
.area-canvas{display:block;width:100%;border-radius:8px}

/* factor pair hint */
.fp-box{width:100%;max-width:440px;background:var(--white);border-radius:var(--r);padding:12px 16px;box-shadow:var(--shadow-s);margin-bottom:12px;min-height:44px;display:flex;align-items:center;justify-content:center;text-align:center}
.fp-text{font-size:13px;font-weight:600;color:var(--slate-m);line-height:1.5}
.fp-text strong{color:var(--ember);font-weight:700}

/* options */
.opts{display:grid;grid-template-columns:1fr 1fr;gap:9px;max-width:440px;width:100%}
.opts.single-col{grid-template-columns:1fr}
.ob{background:var(--white);border:2px solid #E2E8F0;border-radius:var(--r);padding:14px 10px;font-size:clamp(13px,3.5vw,17px);font-weight:600;font-family:'JetBrains Mono',monospace;color:var(--slate);cursor:pointer;transition:all .25s cubic-bezier(.34,1.56,.64,1);text-align:center;line-height:1.4}
.ob:hover{border-color:var(--ember);transform:translateY(-2px);box-shadow:var(--shadow-s)}.ob:active{transform:scale(.96)}
.ob.ok{background:var(--green-lt);border-color:var(--green);color:#166534;animation:okP .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes okP{0%{transform:scale(.9)}50%{transform:scale(1.06)}100%{transform:scale(1)}}
.ob.nope{animation:nSh .45s ease;opacity:.3;pointer-events:none}
@keyframes nSh{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
.ob.off{opacity:.25;pointer-events:none}
.g-hint{margin-top:10px;font-size:13px;color:var(--ember-dk);font-weight:600;min-height:20px;max-width:440px;text-align:center;line-height:1.5}
.streak-bx{position:fixed;top:68px;right:14px;background:linear-gradient(135deg,var(--amber),var(--gold));color:var(--slate);padding:7px 14px;border-radius:100px;font-weight:700;font-size:12px;box-shadow:var(--shadow-m);z-index:50;display:none}
.streak-bx.on{display:block;animation:sbI .5s cubic-bezier(.34,1.56,.64,1)}
@keyframes sbI{0%{transform:translateX(80px) scale(.5);opacity:0}100%{transform:translateX(0) scale(1);opacity:1}}

/* RESULT */
.res-s{align-items:center;justify-content:center;background:linear-gradient(155deg,#FEF0ED 0%,#FDDDD6 50%,#F9C4B8 100%);padding:40px 24px;text-align:center;position:relative;overflow:hidden}
.rs-st{display:flex;gap:12px;margin-bottom:20px}
.rs{width:48px;height:48px;opacity:0;transform:scale(0) rotate(-25deg)}.rs.got{animation:sE .6s cubic-bezier(.34,1.56,.64,1) forwards}
.rs:nth-child(2).got{animation-delay:.2s}.rs:nth-child(3).got{animation-delay:.4s}
@keyframes sE{0%{opacity:0;transform:scale(0) rotate(-25deg)}100%{opacity:1;transform:scale(1) rotate(0)}}
.rs svg{width:100%;height:100%}
.rs-t{font-size:26px;font-weight:700;margin-bottom:6px;animation:fU .6s ease .5s both}
.rs-msg{font-size:14px;color:var(--slate-m);font-weight:500;margin-bottom:10px;animation:fU .6s ease .6s both;line-height:1.6}
.rs-row{display:flex;gap:24px;margin:20px 0 30px;animation:fU .6s ease .7s both}
.rv{font-size:22px;font-weight:700;color:var(--ember)}.rl{font-size:11px;color:var(--slate-m);font-weight:600}
@keyframes fU{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.btn-n{background:var(--ember);color:#fff;border:none;padding:14px 40px;border-radius:100px;font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;box-shadow:0 8px 24px rgba(232,85,61,.3);transition:all .3s;animation:fU .6s ease .8s both}
.btn-n:hover{transform:translateY(-2px)}.btn-n:active{transform:scale(.97)}
.btn-s2{background:transparent;color:var(--slate-m);border:2px solid rgba(232,85,61,.2);padding:10px 26px;border-radius:100px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .3s;animation:fU .6s ease .9s both;margin-top:10px}
.btn-s2:hover{border-color:var(--ember);color:var(--ember)}

.ptc-b{position:fixed;inset:0;pointer-events:none;z-index:1000;overflow:hidden}
.ptc{position:absolute;border-radius:50%;animation:ptcF 1s ease-out forwards}
@keyframes ptcF{0%{opacity:1;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0)}}
.big-ok{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);width:84px;height:84px;z-index:999;pointer-events:none}
.big-ok.go{animation:bP .8s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes bP{0%{transform:translate(-50%,-50%) scale(0);opacity:0}40%{transform:translate(-50%,-50%) scale(1.15);opacity:1}100%{transform:translate(-50%,-50%) scale(0);opacity:0}}

@media(max-width:480px){.area-wrap{padding:10px}.opts{gap:7px}.ob{padding:11px 6px;font-size:clamp(12px,3vw,15px)}}
</style>
</head>
<body>
<div class="ptc-b" id="ptcB"></div>
<div class="big-ok" id="bigOk"><svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="48" fill="#16A34A"/><path d="M30 52L45 67L72 35" fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/></svg></div>

<!-- WELCOME -->
<div class="screen welcome active" id="scnW">
  <div class="w-gear" style="width:400px;height:400px;top:-100px;right:-100px"></div>
  <div class="w-gear" style="width:250px;height:250px;bottom:-60px;left:-60px;animation-direction:reverse"></div>
  <div class="w-box">
    <div class="w-badge">U → E · EDEXCEL PURE 1</div>
    <h1 class="w-title">因式<em>工坊</em></h1>
    <div class="w-eq">x² + 5x + 6 → (x + 2)(x + 3)</div>
    <p class="w-sub">因式分解是展开的逆过程——把长表达式打包回括号里<small>每道题都有面积模型帮你"看到"因式怎么藏在里面</small></p>
    <button class="btn-go" onclick="enterMap()">进入工坊 →</button>
  </div>
</div>

<!-- MAP -->
<div class="screen map-s" id="scnM">
  <div class="m-top"><h2 class="m-h">工坊地图</h2><div class="m-st"><svg width="18" height="18" viewBox="0 0 24 24" fill="#FBBF24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg><span id="allSt">0</span></div></div>
  <div class="m-list" id="mL"></div>
</div>

<!-- GAME -->
<div class="screen game-s" id="scnG">
  <div class="gh"><button class="gh-b" onclick="toMap()">← 返回</button><span class="gh-z" id="ghZ"></span><span class="gh-l" id="ghL"></span></div>
  <div class="gbd">
    <div class="gds" id="gDs"></div>
    <div class="eq-card"><div class="eq-lbl">FACTORISE 因式分解</div><div class="eq-text" id="eqTxt"></div></div>
    <div class="area-wrap"><canvas class="area-canvas" id="aC"></canvas></div>
    <div class="fp-box"><div class="fp-text" id="fpTxt">找到正确的因式…</div></div>
    <div class="opts" id="optsG"></div>
    <div class="g-hint" id="gHint"></div>
  </div>
  <div class="streak-bx" id="strkB"></div>
</div>

<!-- RESULT -->
<div class="screen res-s" id="scnR">
  <div class="rs-st" id="rsSt"></div>
  <h2 class="rs-t" id="rsT"></h2>
  <p class="rs-msg" id="rsMsg"></p>
  <div class="rs-row"><div><div class="rv" id="rvO">0</div><div class="rl">答对</div></div><div><div class="rv" id="rvS">0</div><div class="rl">最长连击</div></div></div>
  <button class="btn-n" id="btnN" onclick="goNxt()">继续分解</button>
  <button class="btn-s2" onclick="toMap()">返回地图</button>
</div>

<script>
/* ======================================================================
   TERM UTILITIES
   ====================================================================== */
function fT(c,p){
  if(c===0)return '0';
  if(p===0)return String(c);
  if(p===1){if(c===1)return 'x';if(c===-1)return '−x';return c+'x'}
  if(c===1)return 'x²';if(c===-1)return '−x²';return c+'x²';
}
function polyStr(terms){
  const s=[...terms].sort((a,b)=>b.power-a.power);
  let r='';
  s.forEach((t,i)=>{
    if(t.coeff===0)return;
    if(i===0)r+=fT(t.coeff,t.power);
    else if(t.coeff>0)r+=' + '+fT(t.coeff,t.power);
    else r+=' − '+fT(Math.abs(t.coeff),t.power);
  });
  return r||'0';
}

/* ======================================================================
   CELL COLORS
   ====================================================================== */
const CS=[
  {fill:'rgba(232,85,61,.12)',stroke:'#E8553D',text:'#C43A24'},
  {fill:'rgba(14,165,160,.12)',stroke:'#0EA5A0',text:'#0C8480'},
  {fill:'rgba(217,119,6,.12)',stroke:'#D97706',text:'#92400E'},
  {fill:'rgba(124,58,237,.12)',stroke:'#7C3AED',text:'#5B21B6'},
];

/* ======================================================================
   ZONES
   ====================================================================== */
const ZONES=[
  {
    id:'cf',name:'提取公因式',desc:'ax + ab → a(x + b)',
    color:'#E8553D',bg:'#FEF0ED',icon:'a(…)',levels:6,
    gen(l){
      const a=ri(2,4+Math.floor(l*.6));
      const b=ri(1,3+l);
      const c=ri(1,4+l);
      // ax + ac → a(x + c) but let's use: a*b and a*c share factor a
      // Simple: a·x + a·c  →  a(x + c)
      const expanded=polyStr([{coeff:a,power:1},{coeff:a*c,power:0}]);
      const answer=`${a}(x + ${c})`;
      const left=[{label:String(a)}];
      const top=[{label:'x',pw:1},{label:String(c),pw:0}];
      const cells=[[{coeff:a,power:1},{coeff:a*c,power:0}]];
      const hint=`${fT(a,1)} 和 ${a*c} 的公因数是 ${a}，提取出来得到 ${answer}`;
      const fpHint=`公因数: <strong>${a}</strong>　→　${fT(a,1)} ÷ ${a} = x，${a*c} ÷ ${a} = ${c}`;
      return{expanded,answer,left,top,cells,hint,fpHint,type:'single'};
    }
  },
  {
    id:'cfn',name:'提取公因式 · 含负',desc:'ax − ab → a(x − b)',
    color:'#0EA5A0',bg:'#E6FAF9',icon:'a(x−b)',levels:6,
    gen(l){
      const a=ri(2,4+Math.floor(l*.6));
      const c=ri(1,4+l);
      const expanded=polyStr([{coeff:a,power:1},{coeff:-a*c,power:0}]);
      const answer=`${a}(x − ${c})`;
      const left=[{label:String(a)}];
      const top=[{label:'x',pw:1},{label:'−'+c,pw:0}];
      const cells=[[{coeff:a,power:1},{coeff:-a*c,power:0}]];
      const hint=`提取公因数 ${a}：${fT(a,1)} ÷ ${a} = x，${-a*c} ÷ ${a} = −${c}`;
      const fpHint=`公因数: <strong>${a}</strong>　→　注意负号！${-a*c} ÷ ${a} = −${c}`;
      return{expanded,answer,left,top,cells,hint,fpHint,type:'single'};
    }
  },
  {
    id:'q1',name:'二次因式 · 正项',desc:'x² + (a+b)x + ab → (x+a)(x+b)',
    color:'#7C3AED',bg:'#EDE9FE',icon:'(+)(+)',levels:7,
    gen(l){
      const a=ri(1,3+Math.floor(l*.6));
      const b=ri(1,3+Math.floor(l*.6));
      const sum=a+b, prod=a*b;
      const expanded=polyStr([{coeff:1,power:2},{coeff:sum,power:1},{coeff:prod,power:0}]);
      // Ensure consistent ordering: smaller first
      const lo=Math.min(a,b), hi=Math.max(a,b);
      const answer=lo===hi?`(x + ${lo})²`:`(x + ${lo})(x + ${hi})`;
      const left=[{label:'x'},{label:String(lo)}];
      const top=[{label:'x',pw:1},{label:String(hi),pw:0}];
      const cells=[
        [{coeff:1,power:2},{coeff:hi,power:1}],
        [{coeff:lo,power:1},{coeff:lo*hi,power:0}]
      ];
      const hint=`找两个数相乘=${prod}、相加=${sum} → ${lo} 和 ${hi}`;
      const fpHint=`乘积 = <strong>${prod}</strong>，　和 = <strong>${sum}</strong>　→　哪两个数？`;
      return{expanded,answer,left,top,cells,hint,fpHint,type:'double'};
    }
  },
  {
    id:'q2',name:'二次因式 · 含负项',desc:'x² + (a−b)x − ab → (x+a)(x−b)',
    color:'#3B82F6',bg:'#EFF6FF',icon:'(+)(−)',levels:7,
    gen(l){
      const a=ri(1,4+Math.floor(l*.5));
      const b=ri(1,4+Math.floor(l*.5));
      if(a===b) return ZONES[3].gen(l); // avoid zero middle, retry
      const sum=a-b, prod=-a*b;
      const expanded=polyStr([{coeff:1,power:2},{coeff:sum,power:1},{coeff:prod,power:0}]);
      const answer=`(x + ${a})(x − ${b})`;
      const left=[{label:'x'},{label:String(a)}];
      const top=[{label:'x',pw:1},{label:'−'+b,pw:0}];
      const cells=[
        [{coeff:1,power:2},{coeff:-b,power:1}],
        [{coeff:a,power:1},{coeff:-a*b,power:0}]
      ];
      const hint=`找两个数相乘=${prod}、相加=${sum} → +${a} 和 −${b}`;
      const fpHint=`乘积 = <strong>${prod}</strong>，　和 = <strong>${sum}</strong>　→　一正一负！`;
      return{expanded,answer,left,top,cells,hint,fpHint,type:'double'};
    }
  },
  {
    id:'ds',name:'平方差公式',desc:'x² − a² → (x+a)(x−a)',
    color:'#D97706',bg:'#FEF3C7',icon:'a²−b²',levels:6,
    gen(l){
      const a=ri(1,4+Math.floor(l*.7));
      const a2=a*a;
      const expanded=polyStr([{coeff:1,power:2},{coeff:-a2,power:0}]);
      const answer=`(x + ${a})(x − ${a})`;
      const left=[{label:'x'},{label:String(a)}];
      const top=[{label:'x',pw:1},{label:'−'+a,pw:0}];
      const cells=[
        [{coeff:1,power:2},{coeff:-a,power:1}],
        [{coeff:a,power:1},{coeff:-a2,power:0}]
      ];
      const hint=`x² − ${a2} = x² − ${a}² = (x+${a})(x−${a})，这是平方差公式！`;
      const fpHint=`${a2} = <strong>${a}²</strong>　→　平方差公式：a² − b² = (a+b)(a−b)`;
      return{expanded,answer,left,top,cells,hint,fpHint,type:'double'};
    }
  },
  {
    id:'mix',name:'综合工坊',desc:'全类型混合，终极分解',
    color:'#E11D48',bg:'#FFF1F3',icon:'MIX',levels:8,
    gen(l){return ZONES[ri(0,4)].gen(l)}
  }
];

const QPL=5;
const CHEERS=['太棒了！因式分解难不倒你！','完美！你是打包大师！','了不起！你能看穿表达式的结构！','每一次分解都让你更强！','你的速度令人惊叹！','分解高手就是你！','继续下去，没有多项式能难倒你！','你已经掌握了因式分解的本质！'];
const OK_W=['正确!','太棒了!','完美!','漂亮!','没错!','好厉害!','Correct!','Well done!'];

/* STATE */
let st=loadS();
function defS(){return{zones:ZONES.map(z=>({id:z.id,levels:Array(z.levels).fill(0)})),total:0}}
function loadS(){try{const s=JSON.parse(localStorage.getItem('factorFactory'));if(s&&s.zones)return s}catch(e){}return defS()}
function saveS(){st.total=st.zones.reduce((a,z)=>a+z.levels.reduce((s,v)=>s+v,0),0);localStorage.setItem('factorFactory',JSON.stringify(st))}
let cZ=0,cL=0,qs=[],qi=0,correct=0,streak=0,maxSk=0,attempts=0,answered=false;

/* HELPERS */
function ri(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function shuf(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=ri(0,i);[r[i],r[j]]=[r[j],r[i]]}return r}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}
function burst(x,y,n=20){const box=document.getElementById('ptcB');const cs=['#E8553D','#0EA5A0','#D97706','#7C3AED','#3B82F6','#FBBF24','#E11D48'];for(let i=0;i<n;i++){const p=document.createElement('div');p.className='ptc';const sz=ri(5,11),ang=(Math.PI*2*i)/n+Math.random()*.5,d=ri(50,140);const tx=Math.cos(ang)*d,ty=Math.sin(ang)*d-30;p.style.cssText=`width:${sz}px;height:${sz}px;background:${cs[i%cs.length]};left:${x}px;top:${y}px;--tx:${tx}px;--ty:${ty}px`;box.appendChild(p);setTimeout(()=>p.remove(),1000)}}
function showCk(){const e=document.getElementById('bigOk');e.classList.remove('go');void e.offsetWidth;e.classList.add('go');setTimeout(()=>e.classList.remove('go'),900)}
function updStrk(){const b=document.getElementById('strkB');if(streak>=3){b.textContent=`🔥 ×${streak}`;b.classList.add('on');b.style.animation='none';void b.offsetWidth;b.style.animation=''}else b.classList.remove('on')}

/* ======================================================================
   CANVAS — REVERSE AREA MODEL
   Phase 0: solid merged rectangle (the unsolved polynomial)
   Phase 1: split into cells with factor labels (the solved factorisation)
   ====================================================================== */
let areaPhase=0, areaAnimTimer=null, areaRevealStep=0;

function drawArea(q, phase, revealStep){
  const canvas=document.getElementById('aC');
  const wrap=canvas.parentElement;
  const W=wrap.clientWidth-32;
  const rows=q.cells.length, cols=q.cells[0].length;
  const ratio=rows===1?0.42:0.62;
  const H=Math.round(W*ratio);
  const dpr=window.devicePixelRatio||2;
  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  const ctx=canvas.getContext('2d');ctx.scale(dpr,dpr);

  const padL=58,padT=42,padR=12,padB=12;
  const gW=W-padL-padR, gH=H-padT-padB;
  const colR=cols===2?[.6,.4]:[1];
  const colW=colR.map(r=>gW*r);
  const rowH=gH/rows;

  ctx.clearRect(0,0,W,H);

  if(phase===0){
    // ---- PHASE 0: merged solid block ----
    // One big rectangle representing the whole polynomial
    ctx.fillStyle='rgba(232,85,61,.06)';
    ctx.strokeStyle='#CBD5E1';
    ctx.lineWidth=2;
    ctx.beginPath();ctx.roundRect(padL,padT,gW,gH,10);ctx.fill();ctx.stroke();

    // Polynomial text centered inside
    ctx.font=`700 ${Math.min(22,gW/10)}px "JetBrains Mono"`;
    ctx.fillStyle='var(--slate)';ctx.fillStyle='#1E293B';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(q.expanded,padL+gW/2,padT+gH/2);

    // Question marks on sides
    ctx.font='700 16px "Space Grotesk"';ctx.fillStyle='#94A3B8';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('?',padL/2+3,padT+gH/2);
    ctx.fillText('?',padL+gW/2,padT/2+4);

    // × symbol
    ctx.font='700 18px "Space Grotesk"';ctx.fillStyle='#CBD5E1';
    ctx.fillText('×',padL/2+3,padT/2+4);

    // Dashed split lines (hint of where to split)
    ctx.setLineDash([6,4]);ctx.strokeStyle='#E2E8F0';ctx.lineWidth=1.5;
    if(cols===2){
      const sx=padL+colW[0];
      ctx.beginPath();ctx.moveTo(sx,padT);ctx.lineTo(sx,padT+gH);ctx.stroke();
    }
    if(rows===2){
      const sy=padT+rowH;
      ctx.beginPath();ctx.moveTo(padL,sy);ctx.lineTo(padL+gW,sy);ctx.stroke();
    }
    ctx.setLineDash([]);

  } else {
    // ---- PHASE 1: split with factor labels revealed ----
    const totalCells=rows*cols;
    const revealed=Math.min(revealStep,totalCells);

    // Grid border
    ctx.strokeStyle='#94A3B8';ctx.lineWidth=2;
    ctx.beginPath();ctx.roundRect(padL,padT,gW,gH,8);ctx.stroke();

    // Inner lines (solid now)
    if(cols===2){
      ctx.beginPath();ctx.moveTo(padL+colW[0],padT);ctx.lineTo(padL+colW[0],padT+gH);ctx.stroke();
    }
    if(rows===2){
      ctx.beginPath();ctx.moveTo(padL,padT+rowH);ctx.lineTo(padL+gW,padT+rowH);ctx.stroke();
    }

    // Cells
    let idx=0;
    let ry=padT;
    for(let r=0;r<rows;r++){
      let cx=padL;
      for(let c=0;c<cols;c++){
        const cw=colW[c];
        const style=CS[idx%CS.length];
        const cell=q.cells[r][c];
        const termStr=fT(cell.coeff,cell.power);

        if(idx<revealed){
          // Colored fill
          ctx.fillStyle=style.fill;
          const ins=3;
          ctx.beginPath();ctx.roundRect(cx+ins,ry+ins,cw-ins*2,rowH-ins*2,6);ctx.fill();
          ctx.strokeStyle=style.stroke;ctx.lineWidth=2;ctx.stroke();

          // Multiplication annotation
          const lL=q.left[r].label, tL=q.top[c].label;
          ctx.font=`600 ${Math.min(11,cw/7)}px "Space Grotesk"`;
          ctx.fillStyle=style.stroke;ctx.globalAlpha=.55;
          ctx.textAlign='center';ctx.textBaseline='top';
          ctx.fillText(lL+' × '+tL,cx+cw/2,ry+8);
          ctx.globalAlpha=1;

          // Product
          ctx.font=`700 ${Math.min(20,cw/4.5)}px "JetBrains Mono"`;
          ctx.fillStyle=style.text;
          ctx.textBaseline='middle';
          ctx.fillText(termStr,cx+cw/2,ry+rowH/2+4);
        } else {
          ctx.fillStyle='#F1F5F9';
          ctx.beginPath();ctx.roundRect(cx+3,ry+3,cw-6,rowH-6,6);ctx.fill();
          ctx.font='700 22px "Space Grotesk"';ctx.fillStyle='#CBD5E1';
          ctx.textAlign='center';ctx.textBaseline='middle';
          ctx.fillText('?',cx+cw/2,ry+rowH/2);
        }

        idx++;cx+=cw;
      }
      ry+=rowH;
    }

    // Factor labels on top (only when fully revealed)
    if(revealed>=totalCells){
      let cx=padL;
      q.top.forEach((t,ci)=>{
        const cw=colW[ci];
        const midX=cx+cw/2;
        // Bracket
        ctx.strokeStyle='#64748B';ctx.lineWidth=1.5;
        const bY=8;
        ctx.beginPath();ctx.moveTo(cx+6,padT-10);ctx.lineTo(cx+6,bY);ctx.lineTo(cx+cw-6,bY);ctx.lineTo(cx+cw-6,padT-10);ctx.stroke();
        // Label
        ctx.font='700 15px "JetBrains Mono"';
        ctx.fillStyle=CS[ci%CS.length].text;
        ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText(t.label,midX,padT/2+4);
        cx+=cw;
      });

      // Factor labels on left
      ry=padT;
      q.left.forEach((t,ri_)=>{
        const midY=ry+rowH/2;
        ctx.strokeStyle='#64748B';ctx.lineWidth=1.5;
        const bX=6;
        ctx.beginPath();ctx.moveTo(padL-10,ry+6);ctx.lineTo(bX,ry+6);ctx.lineTo(bX,ry+rowH-6);ctx.lineTo(padL-10,ry+rowH-6);ctx.stroke();
        ctx.font='700 15px "JetBrains Mono"';
        ctx.fillStyle=CS[(ri_+2)%CS.length].text;
        ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText(t.label,padL/2+3,midY);
        ry+=rowH;
      });

      // × symbol
      ctx.font='700 18px "Space Grotesk"';ctx.fillStyle='#64748B';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('×',padL/2+3,padT/2+4);
    }
  }
}

function animReveal(q){
  const total=q.cells.length*q.cells[0].length;
  areaRevealStep=0;areaPhase=1;
  drawArea(q,1,0);
  if(areaAnimTimer)clearInterval(areaAnimTimer);
  areaAnimTimer=setInterval(()=>{
    areaRevealStep++;
    drawArea(q,1,areaRevealStep);
    if(areaRevealStep>total){clearInterval(areaAnimTimer);areaAnimTimer=null}
  },400);
}

function revealAll(q){
  if(areaAnimTimer){clearInterval(areaAnimTimer);areaAnimTimer=null}
  areaPhase=1;
  const total=q.cells.length*q.cells[0].length;
  areaRevealStep=total+1;
  drawArea(q,1,total+1);
}

/* ======================================================================
   GENERATE DISTRACTORS
   ====================================================================== */
function genQs(zone,lvl){
  const questions=[];
  for(let i=0;i<QPL;i++){
    const q=zone.gen(lvl);
    const dists=new Set([q.answer]);
    let safe=0;

    while(dists.size<4&&safe<80){
      const r=Math.random();
      if(q.type==='single'){
        // Common factor distractors
        // Parse out the factor and inner terms
        const m=q.answer.match(/^(\d+)\((.+)\)$/);
        if(m){
          const f=parseInt(m[1]);
          if(r<.33){
            // Wrong factor
            const nf=f+(Math.random()>.5?1:-1);
            if(nf>1) dists.add(`${nf}(x ${nf*ri(1,5)>0?'+ ':'− '}${Math.abs(ri(1,9))})`);
          } else if(r<.66){
            // Sign error
            const inner=m[2];
            if(inner.includes('+')) dists.add(`${f}(${inner.replace('+','−')})`);
            else dists.add(`${f}(${inner.replace('−','+')})`);
          } else {
            dists.add(`${f+1}(x + ${ri(1,8)})`);
          }
        }
      } else {
        // Quadratic distractors
        if(r<.25){
          // Swap signs
          const swapped=q.answer.replace(/\+ (\d+)\)/g,(m,d)=>`− ${d})`).replace(/− (\d+)\)/g,(m,d)=>`+ ${d})`);
          if(swapped!==q.answer)dists.add(swapped);
        } else if(r<.5){
          // Change one number
          const nums=[...q.answer.matchAll(/\d+/g)].map(m=>parseInt(m[0]));
          if(nums.length>=2){
            const idx=ri(0,nums.length-1);
            const newN=nums[idx]+(Math.random()>.5?1:-1);
            if(newN>0){
              let s=q.answer,c=0;
              s=s.replace(/\d+/g,m=>{const v=c===idx?String(newN):m;c++;return v});
              dists.add(s);
            }
          }
        } else if(r<.75){
          // Factor order swap with sign change
          const m2=q.answer.match(/\(x ([+−]) (\d+)\)\(x ([+−]) (\d+)\)/);
          if(m2){
            const s1=m2[1]==='+'?'−':'+', n1=m2[2];
            dists.add(`(x ${s1} ${n1})(x ${m2[3]} ${m2[4]})`);
          }
        } else {
          // Random nearby factorisation
          const a=ri(1,6),b=ri(1,6);
          const s1=Math.random()>.5?'+':'−';
          const s2=Math.random()>.5?'+':'−';
          dists.add(`(x ${s1} ${a})(x ${s2} ${b})`);
        }
      }
      safe++;
    }
    // Fill
    while(dists.size<4)dists.add(q.type==='single'?`${ri(2,6)}(x + ${ri(1,9)})`:`(x + ${ri(1,6)})(x + ${ri(1,6)})`);

    q.options=shuf([...dists]);
    questions.push(q);
  }
  return questions;
}

/* ======================================================================
   MAP
   ====================================================================== */
function renderMap(){
  const list=document.getElementById('mL');list.innerHTML='';
  document.getElementById('allSt').textContent=st.total;
  ZONES.forEach((z,zi)=>{
    const zs=st.zones[zi];const done=zs.levels.filter(v=>v>0).length;
    const zStars=zs.levels.reduce((a,v)=>a+v,0);
    const prevOk=zi===0||st.zones[zi-1].levels.filter(v=>v>0).length>=Math.ceil(ZONES[zi-1].levels*.5);
    const unlocked=prevOk,complete=done===z.levels,current=unlocked&&!complete;
    const card=document.createElement('div');
    card.className=`zc${!unlocked?' lk':''}${complete?' dn':''}${current?' nw':''}`;
    card.innerHTML=`<div class="zi" style="background:${z.bg};color:${z.color}">${z.icon}</div>
      <div class="zb"><div class="zn" style="color:${unlocked?z.color:'#999'}">${z.name}</div><div class="zd">${unlocked?z.desc:'完成前面的区域解锁'}</div>
      <div class="zdots">${zs.levels.map((v,li)=>{const d=v>0;const c=!d&&(li===0||zs.levels[li-1]>0);return`<div class="zdt${d?' on':''}${c?' cu':''}"></div>`}).join('')}</div></div>
      <div class="zr"><div class="zsv">${zStars}/${z.levels*3}</div></div>`;
    if(unlocked) card.onclick=()=>openZ(zi);
    list.appendChild(card);
  });
}
function openZ(zi){cZ=zi;const zs=st.zones[zi];let l=zs.levels.findIndex(v=>v===0);if(l===-1)l=0;startLvl(l)}

/* ======================================================================
   GAME PLAY
   ====================================================================== */
function startLvl(l){
  cL=l;qi=0;correct=0;streak=0;maxSk=0;attempts=0;answered=false;
  const z=ZONES[cZ];qs=genQs(z,l);
  document.getElementById('ghZ').textContent=z.name;
  document.getElementById('ghZ').style.color=z.color;
  document.getElementById('ghL').textContent=`Level ${l+1}`;
  show('scnG');renderQ();
}

function renderQ(){
  answered=false;areaPhase=0;
  if(areaAnimTimer){clearInterval(areaAnimTimer);areaAnimTimer=null}
  const q=qs[qi];

  const dots=document.getElementById('gDs');dots.innerHTML='';
  for(let i=0;i<QPL;i++){const d=document.createElement('div');d.className=`gd${i<qi?' done':''}${i===qi?' act':''}`;dots.appendChild(d)}

  document.getElementById('eqTxt').textContent=q.expanded;
  drawArea(q,0,0);
  document.getElementById('fpTxt').innerHTML='找到正确的因式…';
  document.getElementById('gHint').textContent='';

  const grid=document.getElementById('optsG');grid.innerHTML='';
  const longest=Math.max(...q.options.map(o=>o.length));
  grid.className=longest>18?'opts single-col':'opts';

  q.options.forEach(opt=>{
    const btn=document.createElement('button');btn.className='ob';
    btn.textContent=opt;
    btn.onclick=e=>handleAns(opt,q,btn,e);
    grid.appendChild(btn);
  });
  updStrk();
}

function handleAns(chosen,q,btn,ev){
  if(answered)return;
  attempts++;

  if(chosen===q.answer){
    answered=true;correct++;streak++;
    if(streak>maxSk)maxSk=streak;

    btn.classList.add('ok');
    document.querySelectorAll('.ob').forEach(b=>{if(!b.classList.contains('ok'))b.classList.add('off')});

    // Animate: split the rectangle and reveal factors
    animReveal(q);

    const total=q.cells.length*q.cells[0].length;
    setTimeout(()=>{
      document.getElementById('fpTxt').innerHTML=q.fpHint;
    },total*400+200);

    const r=btn.getBoundingClientRect();
    burst(r.left+r.width/2,r.top+r.height/2,streak>=3?26:14);
    showCk();updStrk();

    document.getElementById('gHint').textContent=OK_W[ri(0,OK_W.length-1)];
    document.getElementById('gHint').style.color='#16A34A';

    setTimeout(()=>{qi++;if(qi>=QPL)finishLvl();else renderQ()},total*400+1400);

  } else {
    streak=0;updStrk();
    btn.classList.add('nope');

    // Show the area model split as hint
    revealAll(q);
    document.getElementById('fpTxt').innerHTML=q.fpHint;

    document.getElementById('gHint').textContent=`💡 ${q.hint}`;
    document.getElementById('gHint').style.color='var(--ember-dk)';
  }
}

/* ======================================================================
   RESULT
   ====================================================================== */
function finishLvl(){
  if(areaAnimTimer){clearInterval(areaAnimTimer);areaAnimTimer=null}
  let stars;if(attempts<=QPL)stars=3;else if(attempts<=QPL+2)stars=2;else stars=1;
  const prev=st.zones[cZ].levels[cL];if(stars>prev){st.zones[cZ].levels[cL]=stars;saveS()}
  const starsEl=document.getElementById('rsSt');starsEl.innerHTML='';
  for(let i=0;i<3;i++){const s=document.createElement('div');s.className=`rs${i<stars?' got':''}`;s.innerHTML=`<svg viewBox="0 0 24 24" fill="${i<stars?'#FBBF24':'#CBD5E1'}"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>`;starsEl.appendChild(s)}
  document.getElementById('rsT').textContent=['做到了！','太棒了！','完美通关！'][Math.min(stars-1,2)];
  document.getElementById('rsMsg').textContent=CHEERS[ri(0,CHEERS.length-1)];
  document.getElementById('rvO').textContent=`${correct}/${QPL}`;
  document.getElementById('rvS').textContent=maxSk;
  const hasNext=cL+1<ZONES[cZ].levels;const btn=document.getElementById('btnN');
  btn.textContent=hasNext?'继续分解':'返回地图';btn.onclick=hasNext?goNxt:toMap;
  show('scnR');setTimeout(()=>burst(window.innerWidth/2,window.innerHeight/3,30),500);
}
function goNxt(){if(cL+1<ZONES[cZ].levels)startLvl(cL+1);else toMap()}
function enterMap(){show('scnM');renderMap()}
function toMap(){if(areaAnimTimer){clearInterval(areaAnimTimer);areaAnimTimer=null}show('scnM');renderMap()}
saveS();
</script>
